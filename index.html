<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thi Trắc Nghiệm - Expert Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --success: #22c55e; --danger: #ef4444; --dark: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); user-select: none; /* Chống copy đề */ }
        .container { max-width: 1100px; background: white; margin: 30px auto; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; min-height: 600px; position: relative; }
        .hidden { display: none !important; }
        .p-30 { padding: 30px; }
        
        /* Progress Bar */
        .progress-container { width: 100%; height: 6px; background: #e2e8f0; position: relative; }
        #progress-bar { height: 100%; background: var(--success); width: 0%; transition: 0.3s; }

        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.9rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-admin { background: #0ea5e9; color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { border: 1px solid #cbd5e1; background: #fff; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: inherit; }

        /* ADMIN DASHBOARD */
        .admin-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; }
        .card { background: #fff; border: 1px solid #e2e8f0; padding: 25px; border-radius: 12px; }
        
        /* STUDENT TABLE */
        .student-list-area { margin-top: 15px; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
        .table-scroll { max-height: 300px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 0.85rem; }
        th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #edf2f7; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; }

        /* QUIZ */
        .quiz-layout { display: grid; grid-template-columns: 1fr 320px; gap: 25px; }
        .option-card { padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .option-card:hover { border-color: var(--primary); background: #f5f3ff; }
        .option-card.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .review-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .q-badge { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; border: 1px solid #cbd5e1; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .q-badge.answered { background: var(--primary); color: white; border-color: var(--primary); }
        .q-badge.current { border: 2px solid var(--dark); box-shadow: 0 0 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- Khóa chuột phải -->

<div id="login-modal">
    <div class="modal-content" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 3000; width: 350px;">
        <h2 style="text-align:center; color: var(--primary); margin-top:0;">HỆ THỐNG THI</h2>
        <input type="text" id="login-user" placeholder="SBD hoặc admin">
        <input type="password" id="login-pass" placeholder="Mật khẩu">
        <button class="btn btn-primary" style="width:100%; margin-top: 15px;" onclick="handleLogin()">ĐĂNG NHẬP</button>
        <p id="login-msg" style="color:var(--danger); text-align: center; margin-top:10px; font-weight: bold;"></p>
    </div>
</div>

<div class="container">
    <!-- MÀN HÌNH ADMIN -->
    <div id="admin-screen" class="hidden p-30">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0">🛠️ Quản Trị Hệ Thống</h2>
            <button class="btn btn-outline" onclick="location.reload()">Đăng xuất</button>
        </div>

        <div class="admin-grid">
            <div class="card">
                <h3 style="margin-top:0">📝 Cấu Hình Đề</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <div><small>Số câu hỏi</small><input type="number" id="cfg-num" value="10"></div>
                    <div><small>Thời gian (phút)</small><input type="number" id="cfg-time" value="15"></div>
                </div>
                <button class="btn btn-admin" style="width:100%; margin-top:15px" onclick="syncDrive()">🔄 ĐỒNG BỘ ĐỀ TỪ DRIVE</button>
                <div id="sync-status" style="font-size: 0.75rem; margin-top:8px; color: #64748b;">Trạng thái: Sẵn sàng.</div>
            </div>

            <div class="card" style="background: #f0f9ff;">
                <h3 style="margin-top:0">👥 Danh Sách Thí Sinh</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <input type="text" id="new-sbd" placeholder="SBD...">
                    <input type="text" id="new-pass" placeholder="Mật khẩu...">
                </div>
                <input type="text" id="new-name" placeholder="Họ và tên...">
                <button class="btn btn-primary" onclick="addNewStudent()" style="width:100%; margin-top: 5px;">➕ THÊM THÍ SINH</button>

                <div class="student-list-area">
                    <div class="table-scroll">
                        <table>
                            <thead><tr><th>SBD</th><th>Họ Tên</th><th>MK</th><th style="text-align:right">Xóa</th></tr></thead>
                            <tbody id="student-list-body"></tbody>
                        </table>
                    </div>
                </div>
                <div style="margin-top: 10px; display: flex; justify-content: space-between; align-items: center;">
                    <button class="btn btn-outline" style="font-size: 0.8rem;" onclick="fetchStudentsFromCloud()">☁️ TẢI TỪ CLOUD</button>
                    <span style="font-size: 0.8rem;">Tổng cộng: <b id="student-total">0</b></span>
                </div>
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH THI -->
    <div id="quiz-screen" class="hidden">
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div style="background: var(--dark); color: white; padding: 15px 30px; display:flex; justify-content: space-between; align-items:center;">
            <div>Thí sinh: <strong id="display-name">---</strong> (<span id="display-sbd">---</span>)</div>
            <div id="timer" style="font-size: 1.5rem; color: #fbbf24; font-weight:bold;">00:00</div>
        </div>
        <div class="p-30 quiz-layout">
            <div id="question-container">
                <div style="display:flex; justify-content: space-between;">
                    <h2 style="margin-top:0; color: var(--primary);">Câu <span id="q-idx">1</span></h2>
                    <span id="cheat-warn" style="color: var(--danger); font-weight: bold; font-size: 0.8rem;"></span>
                </div>
                <h3 id="q-text" style="margin-bottom:20px; min-height: 60px;"></h3>
                <div id="options-box"></div>
                <div style="display:flex; gap:15px; margin-top:30px;">
                    <button class="btn btn-outline" style="flex:1" onclick="changeQuestion(-1)">QUAY LẠI</button>
                    <button class="btn btn-primary" style="flex:1" onclick="changeQuestion(1)">TIẾP THEO</button>
                </div>
            </div>
            <div style="background:#f8fafc; padding:20px; border-radius:12px; border:1px solid #eee;">
                <h4 style="margin-top:0">DANH SÁCH CÂU HỎI</h4>
                <div class="review-grid" id="review-grid"></div>
                <button class="btn btn-danger" style="width:100%; margin-top:30px" onclick="confirmSubmission()">NỘP BÀI THI</button>
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH KẾT QUẢ -->
    <div id="result-screen" class="hidden p-30" style="text-align:center">
        <div style="max-width: 500px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);">
            <h2 style="color: #64748b; margin-bottom: 0;">KẾT QUẢ CỦA BẠN</h2>
            <h1 id="res-score" style="font-size: 5rem; color: var(--primary); margin: 10px 0;">0/0</h1>
            <div id="res-rating" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 20px;"></div>
            <div style="text-align: left; background: #f1f5f9; padding: 15px; border-radius: 10px; margin-bottom: 25px;">
                <p>Thí sinh: <b id="res-name"></b></p>
                <p>Số báo danh: <b id="res-sbd"></b></p>
                <p>Thời gian làm bài: <b id="res-time"></b></p>
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="location.reload()">QUAY LẠI TRANG CHỦ</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDLzkl-dhmyTlPdsF4bxvX9ksrV51tzWZLFmWOg772Oz4g8f9umbfGLPRuJsoVLT9viQ/exec";
    let db_questions = JSON.parse(localStorage.getItem('db_questions')) || [];
    let validStudents = JSON.parse(localStorage.getItem('db_students')) || [];
    let currentExam = [], userAnswers = [], currentIdx = 0, timerInterval, totalSec = 0, startTime = 0;
    let currentUser = null;
    let cheatCount = 0;

    window.onload = () => { renderStudentList(); };

    // --- XỬ LÝ ĐĂNG NHẬP ---
    function handleLogin() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        if(u === 'admin' && p === 'admin') {
            document.getElementById('login-modal').style.display = 'none';
            switchScreen('admin-screen');
            return;
        }
        const student = validStudents.find(s => s.sbd === u && s.pass === p);
        if(student) {
            currentUser = student;
            document.getElementById('login-modal').style.display = 'none';
            startQuiz(student);
        } else {
            document.getElementById('login-msg').innerText = "Sai thông tin đăng nhập!";
        }
    }

    // --- QUẢN LÝ THÍ SINH ---
    function renderStudentList() {
        const tbody = document.getElementById('student-list-body');
        tbody.innerHTML = '';
        validStudents.forEach(s => {
            tbody.innerHTML += `<tr>
                <td><b style="color:var(--primary)">${s.sbd}</b></td>
                <td>${s.name}</td>
                <td><code>${s.pass}</code></td>
                <td style="text-align:right"><button onclick="removeStudent('${s.sbd}')" style="color:var(--danger); border:none; background:none; cursor:pointer;">✕</button></td>
            </tr>`;
        });
        document.getElementById('student-total').innerText = validStudents.length;
    }

    async function addNewStudent() {
        const sbd = document.getElementById('new-sbd').value.trim();
        const name = document.getElementById('new-name').value.trim();
        const pass = document.getElementById('new-pass').value.trim();
        if(!sbd || !name || !pass) return alert("Vui lòng điền đủ thông tin!");
        
        const newS = { sbd, name, pass };
        validStudents.push(newS);
        localStorage.setItem('db_students', JSON.stringify(validStudents));
        renderStudentList();

        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "addStudent", data: newS }) });
    }

    async function fetchStudentsFromCloud() {
        try {
            const res = await fetch(SCRIPT_URL + "?action=getStudents");
            validStudents = await res.json();
            localStorage.setItem('db_students', JSON.stringify(validStudents));
            renderStudentList();
            alert("Đã đồng bộ danh sách thí sinh!");
        } catch(e) { alert("Lỗi tải Cloud!"); }
    }

    function removeStudent(sbd) {
        if(confirm(`Xác nhận xóa thí sinh SBD: ${sbd}?`)) {
            validStudents = validStudents.filter(s => s.sbd !== sbd);
            localStorage.setItem('db_students', JSON.stringify(validStudents));
            renderStudentList();
            fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "deleteStudent", sbd: sbd }) });
        }
    }

    // --- LOGIC THI ---
    async function syncDrive() {
        const stt = document.getElementById('sync-status');
        stt.innerText = "⏳ Đang tải dữ liệu...";
        try {
            const res = await fetch(SCRIPT_URL + "?action=syncDrive");
            db_questions = await res.json();
            localStorage.setItem('db_questions', JSON.stringify(db_questions));
            stt.innerText = `✅ Đã tải ${db_questions.length} câu hỏi thành công.`;
        } catch(e) { stt.innerText = "❌ Lỗi Drive!"; }
    }

    function startQuiz(student) {
        document.getElementById('display-sbd').innerText = student.sbd;
        document.getElementById('display-name').innerText = student.name;
        
        const num = parseInt(document.getElementById('cfg-num').value) || 10;
        currentExam = [...db_questions].sort(() => 0.5 - Math.random()).slice(0, num);
        userAnswers = currentExam.map(q => ({ choice: null, correct: q.correct.toString().toLowerCase().trim() }));
        
        totalSec = (parseInt(document.getElementById('cfg-time').value) || 15) * 60;
        startTime = totalSec;
        
        switchScreen('quiz-screen');
        runTimer();
        renderQuestion();
        initAntiCheat();
    }

    function renderQuestion() {
        const q = currentExam[currentIdx];
        document.getElementById('q-idx').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = q.q;
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        ['a','b','c','d'].forEach(k => {
            if(q[k]) {
                const div = document.createElement('div');
                div.className = `option-card ${userAnswers[currentIdx].choice === k ? 'selected' : ''}`;
                div.innerHTML = `<b>${k.toUpperCase()}.</b> ${q[k]}`;
                div.onclick = () => { selectOption(k); };
                box.appendChild(div);
            }
        });

        // Update progress & UI
        const percent = ((userAnswers.filter(a => a.choice).length) / currentExam.length) * 100;
        document.getElementById('progress-bar').style.width = percent + "%";
        renderReviewGrid();
    }

    function selectOption(k) {
        userAnswers[currentIdx].choice = k;
        renderQuestion();
    }

    function renderReviewGrid() {
        const grid = document.getElementById('review-grid');
        grid.innerHTML = userAnswers.map((ans, i) => `
            <div class="q-badge ${i === currentIdx ? 'current' : ''} ${ans.choice ? 'answered' : ''}" 
                 onclick="currentIdx=${i};renderQuestion()">${i + 1}</div>
        `).join('');
    }

    function changeQuestion(step) {
        let n = currentIdx + step;
        if(n >= 0 && n < currentExam.length) { currentIdx = n; renderQuestion(); }
    }

    function runTimer() {
        timerInterval = setInterval(() => {
            totalSec--;
            let m = Math.floor(totalSec/60), s = totalSec%60;
            document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if(totalSec <= 60) document.getElementById('timer').style.color = 'var(--danger)';
            if(totalSec <= 0) finalizeQuiz();
        }, 1000);
    }

    function initAntiCheat() {
        window.onblur = () => {
            cheatCount++;
            if(cheatCount >= 3) {
                alert("Bạn đã thoát tab quá 3 lần. Hệ thống tự động nộp bài!");
                finalizeQuiz();
            } else {
                document.getElementById('cheat-warn').innerText = `Cảnh báo: Không thoát tab (${cheatCount}/3)`;
            }
        };
    }

    function finalizeQuiz() {
        clearInterval(timerInterval);
        window.onblur = null;
        
        let correctCount = userAnswers.filter(a => a.choice === a.correct).length;
        let score10 = (correctCount / currentExam.length) * 10;
        
        // Rating
        let rating = "Yếu";
        if(score10 >= 8) rating = "Xuất Sắc 🌟";
        else if(score10 >= 6.5) rating = "Khá 👍";
        else if(score10 >= 5) rating = "Trung Bình 😐";

        document.getElementById('res-score').innerText = `${correctCount}/${currentExam.length}`;
        document.getElementById('res-rating').innerText = rating;
        document.getElementById('res-name').innerText = currentUser.name;
        document.getElementById('res-sbd').innerText = currentUser.sbd;
        
        let usedTime = startTime - totalSec;
        document.getElementById('res-time').innerText = Math.floor(usedTime/60) + " phút " + (usedTime%60) + " giây";

        switchScreen('result-screen');

        // Gửi kết quả lên Cloud
        fetch(SCRIPT_URL, { 
            method: "POST", 
            mode: "no-cors", 
            body: JSON.stringify({ 
                action: "saveResult", 
                data: { sbd: currentUser.sbd, name: currentUser.name, score: correctCount, total: currentExam.length } 
            }) 
        });
    }

    function confirmSubmission() {
        const unanswered = userAnswers.filter(a => !a.choice).length;
        let msg = "Bạn chắc chắn muốn nộp bài?";
        if(unanswered > 0) msg = `Bạn còn ${unanswered} câu chưa trả lời. Vẫn muốn nộp bài?`;
        if(confirm(msg)) finalizeQuiz();
    }

    function switchScreen(id) {
        ['admin-screen', 'quiz-screen', 'result-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
