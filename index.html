<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thi Trắc Nghiệm - Quản Lý Thí Sinh Tối Ưu</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --success: #22c55e; --danger: #ef4444; --dark: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); user-select: none; }
        .container { max-width: 1150px; background: white; margin: 30px auto; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; min-height: 600px; position: relative; }
        .hidden { display: none !important; }
        .p-30 { padding: 30px; }
        
        /* Progress Bar */
        .progress-container { width: 100%; height: 6px; background: #e2e8f0; }
        #progress-bar { height: 100%; background: var(--success); width: 0%; transition: 0.3s; }

        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.85rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-admin { background: #0ea5e9; color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { border: 1px solid #cbd5e1; background: #fff; }
        
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-family: inherit; }

        /* ADMIN DASHBOARD */
        .admin-grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .card { background: #fff; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; height: fit-content; }
        
        /* STUDENT MANAGEMENT IMPROVEMENTS */
        .student-controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px dashed #cbd5e1; }
        .search-box { position: relative; margin-bottom: 10px; }
        .search-box input { padding-left: 35px; border-radius: 20px; background: #fff; }

        .student-list-area { border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
        .table-scroll { max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 0.85rem; }
        th { background: #f1f5f9; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 10; color: #475569; }
        td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; }
        tr:hover { background: #fcfdfe; }

        /* QUIZ */
        .quiz-layout { display: grid; grid-template-columns: 1fr 320px; gap: 25px; }
        .option-card { padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
        .option-card.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .review-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .q-badge { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; border: 1px solid #cbd5e1; cursor: pointer; font-weight: bold; }
        .q-badge.answered { background: var(--primary); color: white; }
    </style>
</head>
<body oncontextmenu="return false;">

<!-- LOGIN -->
<div id="login-modal">
    <div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 3000; width: 320px;">
        <h2 style="text-align:center; color: var(--primary); margin-top:0;">HỆ THỐNG THI</h2>
        <input type="text" id="login-user" placeholder="SBD hoặc admin">
        <input type="password" id="login-pass" placeholder="Mật khẩu">
        <button class="btn btn-primary" style="width:100%; margin-top: 15px;" onclick="handleLogin()">ĐĂNG NHẬP</button>
        <p id="login-msg" style="color:var(--danger); text-align: center; margin-top:10px; font-weight: bold; font-size: 0.8rem;"></p>
    </div>
</div>

<div class="container">
    <!-- MÀN HÌNH ADMIN -->
    <div id="admin-screen" class="hidden p-30">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0">🛠️ Bảng Điều Khiển Admin</h2>
            <button class="btn btn-outline" onclick="location.reload()">Đăng xuất</button>
        </div>

        <div class="admin-grid">
            <!-- Cấu hình -->
            <div class="card">
                <h3 style="margin-top:0">📝 Thiết Lập Đề</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <div><small>Số câu hỏi</small><input type="number" id="cfg-num" value="10"></div>
                    <div><small>Thời gian (phút)</small><input type="number" id="cfg-time" value="15"></div>
                </div>
                <button class="btn btn-admin" style="width:100%; margin-top:15px" onclick="syncDrive()">🔄 ĐỒNG BỘ CÂU HỎI</button>
                <p id="sync-status" style="font-size: 0.7rem; margin-top:8px; color: #64748b; text-align:center;">Sẵn sàng</p>
            </div>

            <!-- Quản lý thí sinh (PHẦN CHỈNH SỬA CHÍNH) -->
            <div class="card" style="border-top: 4px solid var(--primary);">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="margin:0">👥 Quản Lý Thí Sinh</h3>
                    <button class="btn btn-outline" style="padding: 5px 12px;" onclick="fetchStudentsFromCloud()">☁️ Tải từ Cloud</button>
                </div>

                <div class="student-controls">
                    <div style="display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 10px;">
                        <input type="text" id="new-sbd" placeholder="SBD">
                        <input type="text" id="new-name" placeholder="Họ và tên thí sinh">
                        <input type="text" id="new-pass" placeholder="Mật khẩu">
                    </div>
                    <button class="btn btn-primary" onclick="addNewStudent()">+ THÊM THÍ SINH MỚI</button>
                </div>

                <div class="search-box">
                    <input type="text" id="search-student" placeholder="Tìm nhanh SBD hoặc tên..." onkeyup="filterStudents()">
                </div>

                <div class="student-list-area">
                    <div class="table-scroll">
                        <table id="table-students">
                            <thead>
                                <tr>
                                    <th>SBD</th>
                                    <th>Họ và Tên</th>
                                    <th>Mật khẩu</th>
                                    <th style="text-align:right">Tác vụ</th>
                                </tr>
                            </thead>
                            <tbody id="student-list-body"></tbody>
                        </table>
                    </div>
                </div>
                <p style="font-size: 0.8rem; margin-top:10px; color: #64748b;">Tổng số: <b id="student-total">0</b> thí sinh.</p>
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH THI -->
    <div id="quiz-screen" class="hidden">
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div style="background: var(--dark); color: white; padding: 15px 30px; display:flex; justify-content: space-between; align-items:center;">
            <div>Thí sinh: <strong id="display-name">---</strong> (<span id="display-sbd">---</span>)</div>
            <div id="timer" style="font-size: 1.5rem; color: #fbbf24; font-weight:bold;">00:00</div>
        </div>
        <div class="p-30 quiz-layout">
            <div id="question-container">
                <h2 style="margin-top:0; color: var(--primary);">Câu <span id="q-idx">1</span></h2>
                <h3 id="q-text" style="margin-bottom:20px; min-height: 50px;"></h3>
                <div id="options-box"></div>
                <div style="display:flex; gap:15px; margin-top:30px;">
                    <button class="btn btn-outline" style="flex:1" onclick="changeQuestion(-1)">QUAY LẠI</button>
                    <button class="btn btn-primary" style="flex:1" onclick="changeQuestion(1)">TIẾP THEO</button>
                </div>
            </div>
            <div style="background:#f8fafc; padding:20px; border-radius:12px;">
                <h4 style="margin-top:0">TIẾN ĐỘ</h4>
                <div class="review-grid" id="review-grid"></div>
                <button class="btn btn-danger" style="width:100%; margin-top:30px" onclick="confirmSubmission()">NỘP BÀI</button>
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH KẾT QUẢ -->
    <div id="result-screen" class="hidden p-30" style="text-align:center">
        <h1 id="res-score" style="font-size: 5rem; color: var(--primary); margin-bottom:0;">0/0</h1>
        <p style="font-size: 1.2rem;">Kết quả bài thi đã được lưu thành công.</p>
        <button class="btn btn-primary" style="margin-top:20px" onclick="location.reload()">QUAY LẠI</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDLzkl-dhmyTlPdsF4bxvX9ksrV51tzWZLFmWOg772Oz4g8f9umbfGLPRuJsoVLT9viQ/exec";
    let db_questions = JSON.parse(localStorage.getItem('db_questions')) || [];
    let validStudents = JSON.parse(localStorage.getItem('db_students')) || [];
    let currentExam = [], userAnswers = [], currentIdx = 0, timerInterval, totalSec = 0;
    let currentUser = null;

    window.onload = () => { renderStudentList(); };

    // --- QUẢN LÝ THÍ SINH (CHỈNH SỬA) ---
    function renderStudentList(data = null) {
        const list = data || validStudents;
        const tbody = document.getElementById('student-list-body');
        tbody.innerHTML = '';
        list.forEach(s => {
            tbody.innerHTML += `<tr>
                <td><b style="color:var(--primary)">${s.sbd}</b></td>
                <td>${s.name}</td>
                <td><code>${s.pass}</code></td>
                <td style="text-align:right">
                    <button onclick="removeStudent('${s.sbd}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">Xóa</button>
                </td>
            </tr>`;
        });
        document.getElementById('student-total').innerText = validStudents.length;
    }

    function filterStudents() {
        const val = document.getElementById('search-student').value.toLowerCase();
        const filtered = validStudents.filter(s => 
            s.sbd.toLowerCase().includes(val) || s.name.toLowerCase().includes(val)
        );
        renderStudentList(filtered);
    }

    async function addNewStudent() {
        const sbd = document.getElementById('new-sbd').value.trim();
        const name = document.getElementById('new-name').value.trim();
        const pass = document.getElementById('new-pass').value.trim();
        
        if(!sbd || !name || !pass) return alert("Vui lòng nhập đủ SBD, Tên và Mật khẩu!");
        if(validStudents.find(x => x.sbd === sbd)) return alert("SBD này đã tồn tại!");

        const newS = { sbd, name, pass };
        validStudents.unshift(newS); // Thêm lên đầu danh sách
        localStorage.setItem('db_students', JSON.stringify(validStudents));
        renderStudentList();
        
        // Reset ô nhập
        document.getElementById('new-sbd').value = '';
        document.getElementById('new-name').value = '';
        document.getElementById('new-pass').value = '';

        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "addStudent", data: newS }) });
    }

    function removeStudent(sbd) {
        if(!confirm(`Xóa thí sinh SBD: ${sbd}?`)) return;
        validStudents = validStudents.filter(s => s.sbd !== sbd);
        localStorage.setItem('db_students', JSON.stringify(validStudents));
        renderStudentList();
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "deleteStudent", sbd: sbd }) });
    }

    async function fetchStudentsFromCloud() {
        document.getElementById('student-total').innerText = "Đang tải...";
        try {
            const res = await fetch(SCRIPT_URL + "?action=getStudents");
            validStudents = await res.json();
            localStorage.setItem('db_students', JSON.stringify(validStudents));
            renderStudentList();
        } catch(e) { alert("Lỗi tải dữ liệu Cloud!"); }
    }

    // --- CÁC TÍNH NĂNG KHÔNG THAY ĐỔI ---
    function handleLogin() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        if(u === 'admin' && p === 'admin') {
            document.getElementById('login-modal').style.display = 'none';
            switchScreen('admin-screen'); return;
        }
        const student = validStudents.find(s => s.sbd === u && s.pass === p);
        if(student) {
            currentUser = student;
            document.getElementById('login-modal').style.display = 'none';
            startQuiz(student);
        } else {
            document.getElementById('login-msg').innerText = "Thông tin không chính xác!";
        }
    }

    async function syncDrive() {
        const stt = document.getElementById('sync-status');
        stt.innerText = "⏳ Đang đồng bộ...";
        try {
            const res = await fetch(SCRIPT_URL + "?action=syncDrive");
            db_questions = await res.json();
            localStorage.setItem('db_questions', JSON.stringify(db_questions));
            stt.innerText = `✅ Đã tải ${db_questions.length} câu.`;
        } catch(e) { stt.innerText = "❌ Lỗi kết nối!"; }
    }

    function startQuiz(student) {
        document.getElementById('display-sbd').innerText = student.sbd;
        document.getElementById('display-name').innerText = student.name;
        const num = parseInt(document.getElementById('cfg-num').value) || 10;
        currentExam = [...db_questions].sort(() => 0.5 - Math.random()).slice(0, num);
        userAnswers = currentExam.map(q => ({ choice: null, correct: q.correct.toString().toLowerCase().trim() }));
        totalSec = (parseInt(document.getElementById('cfg-time').value) || 15) * 60;
        switchScreen('quiz-screen'); runTimer(); renderQuestion();
    }

    function renderQuestion() {
        const q = currentExam[currentIdx];
        document.getElementById('q-idx').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('options-box'); box.innerHTML = '';
        ['a','b','c','d'].forEach(k => {
            if(q[k]) {
                const div = document.createElement('div');
                div.className = `option-card ${userAnswers[currentIdx].choice === k ? 'selected' : ''}`;
                div.innerHTML = `<b>${k.toUpperCase()}.</b> ${q[k]}`;
                div.onclick = () => { userAnswers[currentIdx].choice = k; renderQuestion(); };
                box.appendChild(div);
            }
        });
        const pct = ((userAnswers.filter(a => a.choice).length) / currentExam.length) * 100;
        document.getElementById('progress-bar').style.width = pct + "%";
        renderReviewGrid();
    }

    function renderReviewGrid() {
        document.getElementById('review-grid').innerHTML = userAnswers.map((ans, i) => `
            <div class="q-badge ${i === currentIdx ? 'current' : ''} ${ans.choice ? 'answered' : ''}" 
                 onclick="currentIdx=${i};renderQuestion()">${i + 1}</div>
        `).join('');
    }

    function changeQuestion(step) {
        let n = currentIdx + step;
        if(n >= 0 && n < currentExam.length) { currentIdx = n; renderQuestion(); }
    }

    function runTimer() {
        timerInterval = setInterval(() => {
            totalSec--;
            let m = Math.floor(totalSec/60), s = totalSec%60;
            document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if(totalSec <= 0) finalizeQuiz();
        }, 1000);
    }

    function finalizeQuiz() {
        clearInterval(timerInterval);
        let score = userAnswers.filter(a => a.choice === a.correct).length;
        document.getElementById('res-score').innerText = `${score}/${currentExam.length}`;
        switchScreen('result-screen');
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "saveResult", data: { sbd: currentUser.sbd, score: score } }) });
    }

    function confirmSubmission() { if(confirm("Bạn có chắc muốn nộp bài?")) finalizeQuiz(); }
    function switchScreen(id) {
        ['admin-screen', 'quiz-screen', 'result-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
