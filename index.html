<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thi Trắc Nghiệm Real-time</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --success: #22c55e; --danger: #ef4444; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 1100px; background: white; margin: 0 auto; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; min-height: 600px; }
        .hidden { display: none !important; }
        .p-30 { padding: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .quiz-header { padding: 20px 30px; background: var(--dark); color: white; display: flex; justify-content: space-between; align-items: center; }
        .option-card { padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; margin-bottom: 12px; cursor: pointer; font-weight: 600; }
        .option-card.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .review-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .q-badge { height: 35px; border-radius: 8px; background: white; border: 1px solid #cbd5e1; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .q-badge.answered { background: var(--primary); color: white; }
        .q-badge.current { border: 2px solid var(--dark); transform: scale(1.1); }
        @media print { .no-print { display: none !important; } #print-area { display: block !important; } }
        #print-area { display: none; padding: 20px; color: black; }
        .print-header { display: flex; justify-content: space-between; border-bottom: 2px solid black; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <!-- MÀN HÌNH ĐĂNG NHẬP -->
    <div id="login-screen" class="p-30">
        <div style="max-width: 400px; margin: 80px auto; text-align: center;">
            <h1 style="color: var(--primary);">ĐĂNG NHẬP</h1>
            <input type="text" id="login-user" placeholder="SBD">
            <input type="password" id="login-pass" placeholder="Mật khẩu">
            <button class="btn btn-primary" style="width: 100%;" onclick="handleLogin()">VÀO THI</button>
            <p id="login-err" style="color: var(--danger);"></p>
        </div>
    </div>

    <!-- MÀN HÌNH CHỌN ĐỀ / PHỤC HỒI -->
    <div id="student-home" class="hidden p-30" style="text-align: center;">
        <h2>Thí sinh: <span id="user-display" style="color: var(--primary);"></span></h2>
        <div id="recovery-msg" style="margin: 20px 0; padding: 15px; background: #fffbeb; border: 1px solid #fef08a; border-radius: 10px; display: none;">
            ⚠️ Bạn có bài thi đang làm dở. Hệ thống sẽ tự động phục hồi!
        </div>
        <button class="btn btn-primary" id="start-btn" style="padding: 20px 50px; font-size: 1.2rem;" onclick="startOrResumeExam()">BẮT ĐẦU LÀM BÀI</button>
    </div>

    <!-- MÀN HÌNH LÀM BÀI -->
    <div id="quiz-screen" class="hidden">
        <div class="quiz-header">
            <div><strong>THI TRỰC TUYẾN</strong> | <span id="header-progress"></span></div>
            <div id="timer" style="font-family: 'Roboto Mono'; font-size: 1.5rem; color: #fbbf24;">00:00</div>
        </div>
        <div class="p-30" style="display: grid; grid-template-columns: 1fr 280px; gap: 25px;">
            <div class="quiz-main">
                <div id="q-text" style="font-size: 1.3rem; font-weight: 700; margin-bottom: 25px;"></div>
                <div id="options-box"></div>
                <div style="margin-top: 30px; display: flex; justify-content: space-between;">
                    <button class="btn" onclick="goPrev()">CÂU TRƯỚC</button>
                    <button class="btn btn-primary" onclick="goNext()">TIẾP THEO</button>
                </div>
            </div>
            <div class="no-print">
                <div style="background: #f1f5f9; padding: 15px; border-radius: 12px;">
                    <h4 style="margin: 0;">Danh sách câu</h4>
                    <div class="review-grid" id="review-grid"></div>
                    <button class="btn btn-danger" style="width: 100%; margin-top: 20px;" onclick="confirmSubmit()">NỘP BÀI</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH KẾT QUẢ / IN -->
    <div id="result-screen" class="hidden p-30">
        <div class="no-print" style="text-align: center;">
            <h1>Kết Quả: <span id="score-text" style="color: var(--primary);"></span></h1>
            <button class="btn btn-primary" onclick="window.print()">IN BÁO CÁO</button>
            <button class="btn" onclick="location.reload()">THOÁT</button>
        </div>
        <div id="print-area">
            <div class="print-header"><div>ĐƠN VỊ TỔ CHỨC</div><div>CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</div></div>
            <h2 style="text-align: center;">BÁO CÁO KẾT QUẢ</h2>
            <p><strong>Thí sinh:</strong> <span id="p-sbd"></span> | <strong>Điểm:</strong> <span id="p-score"></span></p>
            <div id="p-details"></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyz0h2Uz2qT4vvQ97ySsL_W2hMGq-b4OwG6TQu-4fn8uF3w4-Huk23HoHGrlqUZLVZXEQ/exec";

    let questionBank = JSON.parse(localStorage.getItem('db_questions')) || [];
    let config = { numQ: 10, duration: 15 };
    let students = [];
    
    let currentExam = [], userAnswers = [], currentIdx = 0;
    let totalSeconds = 0, timerInterval, syncInterval;

    window.onload = async () => {
        try {
            const res = await fetch(SCRIPT_URL + "?action=getData");
            const data = await res.json();
            config = data.config; students = data.users;
        } catch(e) { console.warn("Offline mode"); }
    };

    function handleLogin() {
        const u = document.getElementById('login-user').value;
        const p = document.getElementById('login-pass').value;
        const user = students.find(s => s.sbd == u && s.pass == p);
        if(user || (u === 'admin' && p === 'admin')) {
            document.getElementById('user-display').innerText = u;
            switchScreen('student-home');
            checkRecovery(u);
        } else { document.getElementById('login-err').innerText = "Sai thông tin!"; }
    }

    function checkRecovery(sbd) {
        const saved = localStorage.getItem('recovery_' + sbd);
        if(saved) document.getElementById('recovery-msg').style.display = 'block';
    }

    function startOrResumeExam() {
        const sbd = document.getElementById('user-display').innerText;
        const saved = localStorage.getItem('recovery_' + sbd);
        
        if(saved) {
            const data = JSON.parse(saved);
            currentExam = data.currentExam;
            userAnswers = data.userAnswers;
            totalSeconds = data.timeLeft;
        } else {
            currentExam = [...questionBank].sort(() => 0.5 - Math.random()).slice(0, config.numQ);
            userAnswers = currentExam.map(q => ({ q: q.q, options: q, userChoice: null, correct: q.correct.toLowerCase() }));
            totalSeconds = config.duration * 60;
        }
        
        switchScreen('quiz-screen');
        startTimer();
        showQuestion();
        
        // Bắt đầu đồng bộ Cloud mỗi 10 giây
        syncInterval = setInterval(syncToCloud, 10000);
    }

    function showQuestion() {
        const q = currentExam[currentIdx];
        document.getElementById('header-progress').innerText = `Câu ${currentIdx+1}/${currentExam.length}`;
        document.getElementById('q-text').innerText = `Câu ${currentIdx+1}: ${q.q}`;
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        ['a','b','c','d'].forEach(k => {
            if(q[k]) {
                const div = document.createElement('div');
                div.className = `option-card ${userAnswers[currentIdx].userChoice === k ? 'selected' : ''}`;
                div.innerText = `${k.toUpperCase()}. ${q[k]}`;
                div.onclick = () => { userAnswers[currentIdx].userChoice = k; saveLocal(); showQuestion(); };
                box.appendChild(div);
            }
        });
        renderReview();
    }

    function saveLocal() {
        const sbd = document.getElementById('user-display').innerText;
        localStorage.setItem('recovery_' + sbd, JSON.stringify({
            currentExam, userAnswers, timeLeft: totalSeconds
        }));
    }

    async function syncToCloud() {
        const sbd = document.getElementById('user-display').innerText;
        const data = { action: "autoSaveProgress", data: { sbd, answers: userAnswers, timeLeft: totalSeconds, currentExam } };
        try {
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
        } catch(e) {}
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            totalSeconds--;
            const m = Math.floor(totalSeconds/60), s = totalSeconds%60;
            document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if(totalSeconds <= 0) finishQuiz();
        }, 1000);
    }

    function confirmSubmit() { if(confirm("Nộp bài?")) finishQuiz(); }

    async function finishQuiz() {
        clearInterval(timerInterval);
        clearInterval(syncInterval);
        const sbd = document.getElementById('user-display').innerText;
        localStorage.removeItem('recovery_' + sbd);

        let score = userAnswers.filter(a => a.userChoice === a.correct).length;
        let scoreStr = `${score}/${currentExam.length}`;
        
        document.getElementById('score-text').innerText = scoreStr;
        document.getElementById('p-sbd').innerText = sbd;
        document.getElementById('p-score').innerText = scoreStr;
        switchScreen('result-screen');

        await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", 
            body: JSON.stringify({ action: "saveResult", data: { sbd, score: scoreStr } }) 
        });
    }

    function renderReview() {
        document.getElementById('review-grid').innerHTML = userAnswers.map((a, i) => `
            <div class="q-badge ${a.userChoice ? 'answered' : ''} ${i === currentIdx ? 'current' : ''}" onclick="currentIdx=${i};showQuestion()">${i+1}</div>
        `).join('');
    }
    function goPrev() { if(currentIdx > 0) { currentIdx--; showQuestion(); } }
    function goNext() { if(currentIdx < currentExam.length - 1) { currentIdx++; showQuestion(); } }
    function switchScreen(id) {
        ['login-screen', 'student-home', 'quiz-screen', 'result-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
