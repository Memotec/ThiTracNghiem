<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thi Trắc Nghiệm Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --success: #22c55e; --danger: #ef4444; --dark: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        .container { max-width: 1100px; background: white; margin: 30px auto; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; min-height: 600px; position: relative; }
        .hidden { display: none !important; }
        .p-30 { padding: 30px; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.9rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-admin { background: #0ea5e9; color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { border: 1px solid #cbd5e1; background: #fff; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: inherit; }

        /* MODAL ĐĂNG NHẬP */
        #login-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        
        /* ADMIN DASHBOARD */
        .admin-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; }
        .card { background: #fff; border: 1px solid #e2e8f0; padding: 25px; border-radius: 12px; }
        
        /* TABLE QUẢN LÝ THÍ SINH */
        .student-table-container { margin-top: 15px; max-height: 350px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f8fafc; position: sticky; top: 0; padding: 12px 10px; text-align: left; border-bottom: 2px solid #eee; font-size: 0.75rem; text-transform: uppercase; color: #64748b; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 0.85rem; color: #1e293b; }
        tr:hover { background-color: #f8fafc; }

        /* QUIZ INTERFACE */
        .quiz-layout { display: grid; grid-template-columns: 1fr 320px; gap: 25px; }
        .option-card { padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
        .option-card.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .review-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .q-badge { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; border: 1px solid #cbd5e1; cursor: pointer; font-weight: bold; }
        .q-badge.answered { background: var(--primary); color: white; }
        .q-badge.current { border: 2px solid var(--primary); color: var(--primary); }
    </style>
</head>
<body>

<!-- MÀN HÌNH ĐĂNG NHẬP -->
<div id="login-modal">
    <div class="modal-content">
        <h2 style="text-align:center; color: var(--primary); margin-top:0;">HỆ THỐNG THI</h2>
        <label style="font-weight:bold; font-size: 0.75rem; color: #64748b;">SỐ BÁO DANH / ADMIN</label>
        <input type="text" id="login-user" placeholder="Nhập tài khoản...">
        <label style="font-weight:bold; font-size: 0.75rem; color: #64748b;">MẬT KHẨU</label>
        <input type="password" id="login-pass" placeholder="••••••••">
        <button class="btn btn-primary" style="width:100%; margin-top: 20px;" onclick="handleLogin()">ĐĂNG NHẬP</button>
        <p id="login-msg" style="color:var(--danger); text-align: center; margin-top:15px; font-weight: bold; font-size: 0.8rem;"></p>
    </div>
</div>

<div class="container">
    <!-- MÀN HÌNH ADMIN -->
    <div id="admin-screen" class="hidden p-30">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom: 2px solid #f1f5f9; padding-bottom:15px;">
            <h2 style="margin:0">🛠️ Bảng Điều Khiển Quản Trị</h2>
            <button class="btn btn-outline" onclick="location.reload()">Đăng xuất</button>
        </div>

        <div class="admin-grid">
            <!-- CẤU HÌNH ĐỀ THI (Giữ nguyên) -->
            <div class="card" style="height: fit-content;">
                <h3 style="margin-top:0">📝 Cấu Hình Đề</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <div><small>Số câu hỏi</small><input type="number" id="cfg-num" value="10"></div>
                    <div><small>Thời gian (phút)</small><input type="number" id="cfg-time" value="15"></div>
                </div>
                <button class="btn btn-admin" style="width:100%; margin-top:15px" onclick="syncDrive()">🔄 ĐỒNG BỘ CÂU HỎI DRIVE</button>
                <div id="sync-status" style="font-size: 0.75rem; margin-top:8px; color: #64748b;">Trạng thái: Sẵn sàng.</div>
            </div>

            <!-- QUẢN LÝ THÍ SINH ĐẦY ĐỦ -->
            <div class="card" style="background: #f0f9ff; border: 1px solid #bae6fd;">
                <h3 style="margin-top:0; color: #0369a1; display:flex; justify-content:space-between; align-items: center;">
                    👥 Quản Lý Thí Sinh 
                    <span id="student-count" style="font-size: 0.8rem; background: #0ea5e9; color: white; padding: 2px 10px; border-radius: 12px;">0</span>
                </h3>
                
                <!-- Form thêm thí sinh -->
                <div style="background: white; padding: 15px; border-radius: 10px; border: 1px solid #bae6fd; margin-bottom: 15px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                        <input type="text" id="new-sbd" placeholder="SBD (Tên đăng nhập)..." style="font-size: 0.85rem;">
                        <input type="text" id="new-pass" placeholder="Mật khẩu..." style="font-size: 0.85rem;">
                    </div>
                    <input type="text" id="new-name" placeholder="Họ và tên thí sinh..." style="font-size: 0.85rem;">
                    <button class="btn btn-primary" onclick="addNewStudent()" style="width:100%; margin-top: 5px;">➕ THÊM THÀNH VIÊN</button>
                </div>
                
                <!-- Bảng danh sách -->
                <div class="student-table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>SBD</th>
                                <th>Họ Tên</th>
                                <th>Mật Khẩu</th>
                                <th style="text-align:right">Xóa</th>
                            </tr>
                        </thead>
                        <tbody id="student-list-body">
                            <!-- Dữ liệu được đổ vào đây -->
                        </tbody>
                    </table>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                    <button class="btn btn-outline" style="font-size: 0.8rem; color: #0369a1;" onclick="fetchStudentsFromCloud()">☁️ TẢI TỪ CLOUD</button>
                    <button class="btn btn-danger" style="font-size: 0.8rem; background: #fca5a5;" onclick="clearAllStudents()">🗑️ XÓA TẤT CẢ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH THI (Giữ nguyên) -->
    <div id="quiz-screen" class="hidden">
        <div style="background: var(--dark); color: white; padding: 15px 30px; display:flex; justify-content: space-between; align-items:center;">
            <div>Thí sinh: <strong id="display-name">---</strong> (<span id="display-sbd">---</span>)</div>
            <div id="timer" style="font-size: 1.6rem; color: #fbbf24; font-weight:bold; font-family: monospace;">00:00</div>
        </div>
        <div class="p-30 quiz-layout">
            <div>
                <h2 style="margin-top:0; color: var(--primary);">Câu <span id="q-idx">1</span>:</h2>
                <h3 id="q-text" style="margin-bottom:25px; line-height:1.5; min-height: 50px;"></h3>
                <div id="options-box"></div>
                <div style="display:flex; gap:15px; margin-top:40px; padding-top:20px; border-top: 1px solid #f1f5f9;">
                    <button class="btn btn-outline" style="flex:1" onclick="changeQuestion(-1)">⬅️ QUAY LẠI</button>
                    <button class="btn btn-primary" style="flex:1" onclick="changeQuestion(1)">TIẾP THEO ➡️</button>
                </div>
            </div>
            <div style="background:#f8fafc; padding:20px; border-radius:12px; border:1px solid #e2e8f0; height: fit-content;">
                <h4 style="margin:0 0 15px 0; text-align:center;">TIẾN ĐỘ</h4>
                <div class="review-grid" id="review-grid"></div>
                <button class="btn btn-danger" style="width:100%; margin-top:30px" onclick="confirmSubmission()">NỘP BÀI THI</button>
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH KẾT QUẢ (Giữ nguyên) -->
    <div id="result-screen" class="hidden p-30" style="text-align:center; padding-top: 80px;">
        <h2 style="color: #64748b;">KẾT QUẢ LÀM BÀI</h2>
        <h1 id="res-score" style="font-size: 6rem; color: var(--primary); margin: 20px 0;">0/0</h1>
        <button class="btn btn-primary" onclick="location.reload()">HOÀN TẤT</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDLzkl-dhmyTlPdsF4bxvX9ksrV51tzWZLFmWOg772Oz4g8f9umbfGLPRuJsoVLT9viQ/exec";

    let db_questions = JSON.parse(localStorage.getItem('db_questions')) || [];
    let validStudents = JSON.parse(localStorage.getItem('db_students')) || [];
    let currentExam = [], userAnswers = [], currentIdx = 0, timerInterval, totalSec = 0;
    let currentUser = null;

    // --- XỬ LÝ ĐĂNG NHẬP ---
    function handleLogin() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        const msg = document.getElementById('login-msg');

        if(u === 'admin' && p === 'admin') {
            document.getElementById('login-modal').style.display = 'none';
            switchScreen('admin-screen');
            renderStudentList();
            return;
        }

        // Tìm thí sinh với đúng cặp SBD và Mật khẩu
        const student = validStudents.find(s => s.sbd === u && s.pass === p);
        
        if(student) {
            currentUser = student;
            document.getElementById('login-modal').style.display = 'none';
            startQuiz(student);
            return;
        }
        msg.innerText = "Tài khoản hoặc mật khẩu không đúng!";
    }

    // --- QUẢN LÝ THÍ SINH ---
    function addNewStudent() {
        const sbd = document.getElementById('new-sbd').value.trim();
        const name = document.getElementById('new-name').value.trim();
        const pass = document.getElementById('new-pass').value.trim();
        
        if(!sbd || !name || !pass) { alert("Vui lòng nhập đủ SBD, Tên và Mật khẩu!"); return; }
        if(validStudents.find(s => s.sbd === sbd)) { alert("Số báo danh này đã tồn tại!"); return; }

        validStudents.push({ sbd, name, pass });
        saveStudents();
        renderStudentList();
        
        // Reset ô nhập
        document.getElementById('new-sbd').value = '';
        document.getElementById('new-name').value = '';
        document.getElementById('new-pass').value = '';
        
        // Gửi lệnh lưu lên Cloud (POST action addStudent)
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "addStudent", data: { sbd, name, pass } }) });
    }

    function removeStudent(sbd) {
        if(!confirm(`Xác nhận xóa thí sinh có SBD: ${sbd}?`)) return;
        validStudents = validStudents.filter(s => s.sbd !== sbd);
        saveStudents();
        renderStudentList();
    }

    function clearAllStudents() {
        if(confirm("CẢNH BÁO: Hành động này sẽ xóa sạch danh sách thí sinh. Tiếp tục?")) {
            validStudents = [];
            saveStudents();
            renderStudentList();
        }
    }

    function renderStudentList() {
        const tbody = document.getElementById('student-list-body');
        document.getElementById('student-count').innerText = validStudents.length;
        
        if(validStudents.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#94a3b8; padding:20px;">Chưa có dữ liệu</td></tr>`;
            return;
        }

        tbody.innerHTML = validStudents.map(s => `
            <tr>
                <td><strong>${s.sbd}</strong></td>
                <td>${s.name}</td>
                <td><code style="background:#f1f5f9; padding:2px 4px; border-radius:4px">${s.pass}</code></td>
                <td style="text-align:right">
                    <button class="btn-danger" style="padding:4px 8px; border:none; border-radius:4px; font-size:0.7rem;" onclick="removeStudent('${s.sbd}')">XÓA</button>
                </td>
            </tr>
        `).join('');
    }

    function saveStudents() { localStorage.setItem('db_students', JSON.stringify(validStudents)); }

    async function fetchStudentsFromCloud() {
        try {
            const res = await fetch(SCRIPT_URL + "?action=getStudents");
            const data = await res.json();
            if(Array.isArray(data)) {
                validStudents = data;
                saveStudents();
                renderStudentList();
            }
        } catch(e) { alert("Không thể tải dữ liệu từ Cloud!"); }
    }

    // --- LOGIC ĐỀ THI & ĐỒNG BỘ (Giữ nguyên) ---
    async function syncDrive() {
        const stt = document.getElementById('sync-status');
        stt.innerText = "⏳ Đang đồng bộ...";
        try {
            const res = await fetch(SCRIPT_URL + "?action=syncDrive");
            db_questions = await res.json();
            localStorage.setItem('db_questions', JSON.stringify(db_questions));
            stt.innerText = `✅ Đã tải ${db_questions.length} câu hỏi.`;
        } catch(e) { stt.innerText = "❌ Lỗi kết nối Drive!"; }
    }

    function startQuiz(student) {
        document.getElementById('display-sbd').innerText = student.sbd;
        document.getElementById('display-name').innerText = student.name;
        
        const backup = localStorage.getItem('backup_' + student.sbd);
        if(backup && confirm("Bạn có bài thi chưa hoàn thành. Phục hồi lại?")) {
            const data = JSON.parse(backup);
            currentExam = data.currentExam; userAnswers = data.userAnswers;
            totalSec = data.totalSec; currentIdx = data.currentIdx;
        } else {
            const num = parseInt(document.getElementById('cfg-num').value) || 10;
            currentExam = [...db_questions].sort(() => 0.5 - Math.random()).slice(0, num);
            userAnswers = currentExam.map(q => ({ choice: null, correct: q.correct.toString().toLowerCase().trim() }));
            totalSec = (parseInt(document.getElementById('cfg-time').value) || 15) * 60;
        }
        switchScreen('quiz-screen');
        runTimer();
        renderQuestion();
    }

    function renderQuestion() {
        const q = currentExam[currentIdx];
        document.getElementById('q-idx').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        ['a','b','c','d'].forEach(k => {
            if(q[k]) {
                const div = document.createElement('div');
                div.className = `option-card ${userAnswers[currentIdx].choice === k ? 'selected' : ''}`;
                div.innerHTML = `<b>${k.toUpperCase()}.</b> ${q[k]}`;
                div.onclick = () => { userAnswers[currentIdx].choice = k; saveProgress(); renderQuestion(); };
                box.appendChild(div);
            }
        });
        renderReviewGrid();
    }

    function renderReviewGrid() {
        document.getElementById('review-grid').innerHTML = userAnswers.map((ans, i) => `
            <div class="q-badge ${i === currentIdx ? 'current' : ''} ${ans.choice ? 'answered' : ''}" 
                 onclick="currentIdx=${i};renderQuestion()">${i + 1}</div>
        `).join('');
    }

    function changeQuestion(step) {
        let n = currentIdx + step;
        if(n >= 0 && n < currentExam.length) { currentIdx = n; renderQuestion(); }
    }

    function saveProgress() {
        localStorage.setItem('backup_' + currentUser.sbd, JSON.stringify({ currentExam, userAnswers, totalSec, currentIdx }));
    }

    function runTimer() {
        timerInterval = setInterval(() => {
            totalSec--;
            const m = Math.floor(totalSec/60), s = totalSec%60;
            document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if(totalSec <= 0) finalizeQuiz();
        }, 1000);
    }

    async function finalizeQuiz() {
        clearInterval(timerInterval);
        localStorage.removeItem('backup_' + currentUser.sbd);
        let score = userAnswers.filter(a => a.choice === a.correct).length;
        document.getElementById('res-score').innerText = score + "/" + currentExam.length;
        switchScreen('result-screen');
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "saveResult", data: { sbd: currentUser.sbd, name: currentUser.name, score: score + "/" + currentExam.length } }) });
    }

    function confirmSubmission() { if(confirm("Xác nhận nộp bài thi?")) finalizeQuiz(); }

    function switchScreen(id) {
        ['admin-screen', 'quiz-screen', 'result-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
