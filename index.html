<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thi Trắc Nghiệm - Full Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --success: #22c55e; --danger: #ef4444; --dark: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        .container { max-width: 1100px; background: white; margin: 40px auto; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; min-height: 550px; }
        .hidden { display: none !important; }
        .p-30 { padding: 30px; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.3s; display: inline-block; text-align: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-admin { background: #0ea5e9; color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { border: 1px solid #cbd5e1; background: #fff; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: inherit; }

        /* MODAL ĐĂNG NHẬP */
        #login-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 380px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: left; }
        .modal-content h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        .label { font-size: 0.85rem; font-weight: 700; color: #64748b; margin-top: 10px; display: block; }

        /* Quiz Layout */
        .quiz-layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .quiz-header { background: var(--dark); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .option-card { padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .option-card.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .review-panel { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; height: fit-content; position: sticky; top: 20px; }
        .review-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .q-badge { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: #fff; border: 1px solid #cbd5e1; font-weight: 700; cursor: pointer; }
        .q-badge.current { border: 2px solid var(--primary); color: var(--primary); }
        .q-badge.answered { background: var(--primary); color: white; border-color: var(--primary); }
    </style>
</head>
<body>

<!-- CỬA SỔ ĐĂNG NHẬP (MODAL) CÓ USER & PASS -->
<div id="login-modal">
    <div class="modal-content">
        <h2>ĐĂNG NHẬP</h2>
        
        <span class="label">Tên đăng nhập (SBD)</span>
        <input type="text" id="login-user" placeholder="Nhập SBD hoặc 'admin'">
        
        <span class="label">Mật khẩu</span>
        <input type="password" id="login-pass" placeholder="Nhập mật khẩu">
        
        <button class="btn btn-primary" style="width:100%; margin-top: 20px;" onclick="handleLogin()">ĐĂNG NHẬP</button>
        <p id="login-msg" style="color:var(--danger); text-align: center; margin-top:15px; font-size: 0.85rem; font-weight: bold;"></p>
    </div>
</div>

<div class="container">
    <div id="welcome-screen" class="p-30" style="text-align:center; padding: 100px 30px;">
        <h1 style="color: #cbd5e1;">Hệ Thống Đang Chờ Đăng Nhập...</h1>
    </div>

    <!-- MÀN HÌNH QUẢN TRỊ -->
    <div id="admin-screen" class="hidden p-30">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #f1f5f9; padding-bottom:15px; margin-bottom:25px;">
            <h3 style="margin:0">BẢNG QUẢN TRỊ VIÊN</h3>
            <button class="btn btn-outline" onclick="location.reload()">Đăng xuất</button>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div style="background: #fff; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px;">
                <h4>⚙️ Thiết lập đề thi</h4>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <input type="number" id="cfg-num" value="10" placeholder="Số câu">
                    <input type="number" id="cfg-time" value="15" placeholder="Phút">
                </div>
                <button class="btn btn-admin" style="width:100%; margin-top:10px" onclick="syncDrive()">ĐỒNG BỘ ĐỀ TỪ DRIVE</button>
            </div>
            <div style="background: #f0f9ff; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px;">
                <h4>👥 Quản lý thí sinh</h4>
                <div style="display:flex; gap:10px">
                    <input type="text" id="new-sbd" placeholder="SBD mới" style="margin:0">
                    <button class="btn btn-primary" onclick="addNewStudent()">THÊM</button>
                </div>
                <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="fetchStudentsFromCloud()">ĐỒNG BỘ DANH SÁCH</button>
                <p id="student-info" style="margin-top:10px; font-weight: bold;"></p>
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH THI -->
    <div id="quiz-screen" class="hidden">
        <div class="quiz-header">
            <div>Thí sinh: <strong id="display-sbd">---</strong></div>
            <div id="timer" style="font-size: 1.6rem; font-weight: bold; color: #fbbf24;">00:00</div>
        </div>
        <div class="p-30 quiz-layout">
            <div>
                <h2 style="margin-top:0; color: var(--primary);">Câu <span id="q-idx">1</span>:</h2>
                <h3 id="q-text" style="line-height: 1.6; min-height: 80px;"></h3>
                <div id="options-box"></div>
                <div style="display:flex; gap: 15px; margin-top: 30px;">
                    <button class="btn btn-outline" style="flex:1" onclick="changeQuestion(-1)">⬅️ QUAY LẠI</button>
                    <button class="btn btn-primary" style="flex:1" onclick="changeQuestion(1)">TIẾP THEO ➡️</button>
                </div>
            </div>
            <div class="review-panel">
                <h4 style="margin:0 0 15px 0;">DANH SÁCH CÂU HỎI</h4>
                <div class="review-grid" id="review-grid"></div>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #cbd5e1;">
                <button class="btn btn-danger" style="width:100%" onclick="confirmSubmission()">NỘP BÀI THI</button>
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH KẾT QUẢ -->
    <div id="result-screen" class="hidden p-30" style="text-align:center">
        <h1 id="res-score" style="font-size: 5rem; color: var(--primary); margin: 20px 0;">0/0</h1>
        <button class="btn btn-primary" onclick="location.reload()">KẾT THÚC</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDLzkl-dhmyTlPdsF4bxvX9ksrV51tzWZLFmWOg772Oz4g8f9umbfGLPRuJsoVLT9viQ/exec";

    let db_questions = JSON.parse(localStorage.getItem('db_questions')) || [];
    let validStudents = JSON.parse(localStorage.getItem('db_students')) || [];
    let currentExam = [], userAnswers = [], currentIdx = 0, timerInterval, totalSec = 0;

    // --- LOGIC ĐĂNG NHẬP MỚI ---
    function handleLogin() {
        const user = document.getElementById('login-user').value.trim();
        const pass = document.getElementById('login-pass').value.trim();
        const msg = document.getElementById('login-msg');

        if (!user || !pass) {
            msg.innerText = "Vui lòng nhập đầy đủ thông tin!";
            return;
        }

        // Kiểm tra Admin
        if (user === 'admin') {
            if (pass === 'admin') {
                document.getElementById('login-modal').style.display = 'none';
                updateStudentUI();
                return switchScreen('admin-screen');
            } else {
                msg.innerText = "Mật khẩu Admin không đúng!";
                return;
            }
        }

        // Kiểm tra Thí sinh (SBD) - Giả định pass thí sinh là '123' hoặc có thể bỏ qua nếu không cần khắt khe
        if (validStudents.length > 0 && !validStudents.includes(user)) {
            msg.innerText = "Số báo danh không tồn tại!";
            return;
        }
        
        if (pass !== '123') { // Mật khẩu mặc định cho thí sinh
            msg.innerText = "Mật khẩu thí sinh không đúng (Mặc định: 123)";
            return;
        }

        // Đăng nhập thành công
        document.getElementById('login-modal').style.display = 'none';
        startQuiz(user);
    }

    // --- CÁC HÀM CŨ GIỮ NGUYÊN ---
    async function syncDrive() {
        try {
            const res = await fetch(SCRIPT_URL + "?action=syncDrive");
            db_questions = await res.json();
            localStorage.setItem('db_questions', JSON.stringify(db_questions));
            alert("Đã tải " + db_questions.length + " câu hỏi.");
        } catch (e) { alert("Lỗi kết nối Drive!"); }
    }

    async function addNewStudent() {
        const sbd = document.getElementById('new-sbd').value.trim();
        if (!sbd) return;
        validStudents.push(sbd);
        localStorage.setItem('db_students', JSON.stringify(validStudents));
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "addStudent", data: { sbd } }) });
        document.getElementById('new-sbd').value = '';
        updateStudentUI();
    }

    async function fetchStudentsFromCloud() {
        const res = await fetch(SCRIPT_URL + "?action=getStudents");
        validStudents = await res.json();
        localStorage.setItem('db_students', JSON.stringify(validStudents));
        updateStudentUI();
    }

    function updateStudentUI() { document.getElementById('student-info').innerText = `Thí sinh hiện có: ${validStudents.length}`; }

    function startQuiz(sbd) {
        document.getElementById('display-sbd').innerText = sbd;
        const saved = localStorage.getItem('backup_' + sbd);
        
        if (saved && confirm("Bạn có bài thi đang làm dở. Khôi phục lại?")) {
            const data = JSON.parse(saved);
            currentExam = data.currentExam; userAnswers = data.userAnswers;
            totalSec = data.totalSec; currentIdx = data.currentIdx;
        } else {
            const num = parseInt(document.getElementById('cfg-num').value) || 10;
            currentExam = [...db_questions].sort(() => 0.5 - Math.random()).slice(0, num);
            userAnswers = currentExam.map(q => ({ choice: null, correct: q.correct.toString().toLowerCase().trim() }));
            totalSec = (parseInt(document.getElementById('cfg-time').value) || 15) * 60;
        }
        switchScreen('quiz-screen');
        runTimer();
        renderQuestion();
    }

    function renderQuestion() {
        const q = currentExam[currentIdx];
        document.getElementById('q-idx').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        ['a','b','c','d'].forEach(key => {
            if (q[key]) {
                const div = document.createElement('div');
                div.className = `option-card ${userAnswers[currentIdx].choice === key ? 'selected' : ''}`;
                div.innerText = key.toUpperCase() + ". " + q[key];
                div.onclick = () => { userAnswers[currentIdx].choice = key; saveProgress(); renderQuestion(); };
                box.appendChild(div);
            }
        });
        renderReviewGrid();
    }

    function renderReviewGrid() {
        document.getElementById('review-grid').innerHTML = userAnswers.map((ans, i) => `
            <div class="q-badge ${i === currentIdx ? 'current' : ''} ${ans.choice ? 'answered' : ''}" 
                 onclick="currentIdx=${i};renderQuestion()">${i + 1}</div>
        `).join('');
    }

    function changeQuestion(step) {
        let n = currentIdx + step;
        if (n >= 0 && n < currentExam.length) { currentIdx = n; renderQuestion(); }
    }

    function saveProgress() {
        const sbd = document.getElementById('login-user').value;
        localStorage.setItem('backup_' + sbd, JSON.stringify({ currentExam, userAnswers, totalSec, currentIdx }));
    }

    function runTimer() {
        timerInterval = setInterval(() => {
            totalSec--;
            const m = Math.floor(totalSec/60), s = totalSec%60;
            document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if (totalSec <= 0) finalizeQuiz();
        }, 1000);
    }

    async function finalizeQuiz() {
        clearInterval(timerInterval);
        const sbd = document.getElementById('login-user').value;
        localStorage.removeItem('backup_' + sbd);
        let score = userAnswers.filter(a => a.choice === a.correct).length;
        document.getElementById('res-score').innerText = score + "/" + currentExam.length;
        switchScreen('result-screen');
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "saveResult", data: { sbd, score: score + "/" + currentExam.length } }) });
    }

    function confirmSubmission() { if(confirm("Nộp bài thi ngay?")) finalizeQuiz(); }

    function switchScreen(id) {
        ['welcome-screen', 'admin-screen', 'quiz-screen', 'result-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
