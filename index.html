<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thi Trắc Nghiệm Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --success: #22c55e; --danger: #ef4444; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        .container { width: 100%; max-width: 1100px; background: white; margin: 0 auto; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); min-height: 600px; overflow: hidden; }
        .hidden { display: none !important; }
        .p-30 { padding: 30px; }
        
        /* Giao diện Admin */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; background: #fff; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        
        /* Giao diện làm bài */
        .quiz-header { padding: 20px; background: var(--dark); color: white; display: flex; justify-content: space-between; align-items: center; }
        .option-card { padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .option-card.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .review-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .q-badge { padding: 10px; text-align: center; border: 1px solid #cbd5e1; border-radius: 8px; cursor: pointer; }
        .q-badge.answered { background: var(--primary); color: white; }
        
        /* Nút bấm */
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        
        @media print { .no-print { display: none !important; } #print-area { display: block !important; } }
    </style>
</head>
<body>

<div class="container">
    <!-- MÀN HÌNH ĐĂNG NHẬP -->
    <div id="login-screen" class="p-30">
        <div style="max-width: 400px; margin: 100px auto; text-align: center;">
            <h1 style="color: var(--primary);">HỆ THỐNG THI ONLINE</h1>
            <input type="text" id="login-user" placeholder="SBD hoặc 'admin'">
            <input type="password" id="login-pass" placeholder="Mật khẩu">
            <button class="btn btn-primary" style="width: 100%;" onclick="handleLogin()">ĐĂNG NHẬP</button>
            <p id="login-err" style="color: var(--danger); margin-top: 10px;"></p>
        </div>
    </div>

    <!-- MÀN HÌNH ADMIN -->
    <div id="admin-screen" class="hidden p-30">
        <div style="display: flex; justify-content: space-between;">
            <h2>BẢNG ĐIỀU KHIỂN ADMIN</h2>
            <button onclick="location.reload()" class="btn">Đăng xuất</button>
        </div>
        
        <div class="admin-grid">
            <div class="card" style="background: #fefce8;">
                <h3>1. Cấu hình bài thi</h3>
                <label>Số câu hỏi/đề:</label>
                <input type="number" id="cfg-numQ">
                <label>Thời gian (phút):</label>
                <input type="number" id="cfg-dur">
                <button class="btn btn-primary" onclick="saveAdminConfig()">Lưu cấu hình Cloud</button>
            </div>
            
            <div class="card" style="background: #f0fdf4;">
                <h3>2. Ngân hàng Drive</h3>
                <p style="font-size: 0.8rem;">Thư mục: 1yfKPNpoBIaUX...</p>
                <button class="btn btn-primary" style="background: #16a34a;" onclick="syncDriveQuestions()">Đồng bộ từ Drive</button>
                <p id="sync-msg" style="margin-top: 10px; font-weight: bold;"></p>
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH CHUẨN BỊ THI -->
    <div id="prep-screen" class="hidden p-30" style="text-align: center;">
        <h2>Chào mừng, <span id="user-name"></span></h2>
        <div style="margin: 30px auto; padding: 20px; background: #f8fafc; border-radius: 15px; max-width: 400px;">
            <p>Số câu hỏi: <strong id="prep-numQ">--</strong></p>
            <p>Thời gian: <strong id="prep-dur">--</strong> phút</p>
        </div>
        <button class="btn btn-primary" style="font-size: 1.5rem;" onclick="startQuiz()">BẮT ĐẦU THI</button>
    </div>

    <!-- MÀN HÌNH LÀM BÀI -->
    <div id="quiz-screen" class="hidden">
        <div class="quiz-header">
            <div id="quiz-progress">Câu 1/10</div>
            <div id="timer" style="font-family: 'Roboto Mono'; font-size: 1.5rem;">00:00</div>
        </div>
        <div class="p-30" style="display: grid; grid-template-columns: 1fr 250px; gap: 30px;">
            <div>
                <h3 id="q-text">Đang tải...</h3>
                <div id="options-box"></div>
                <div style="margin-top: 20px;">
                    <button class="btn" onclick="prevQ()">Câu trước</button>
                    <button class="btn btn-primary" onclick="nextQ()">Câu sau</button>
                </div>
            </div>
            <div class="no-print">
                <h4>Danh sách câu</h4>
                <div class="review-grid" id="review-grid"></div>
                <button class="btn btn-danger" style="width:100%; margin-top: 20px;" onclick="submitQuiz()">NỘP BÀI</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyz12e3mRLweqysRvcz_-wS-j6GyWpidpu3gnsJD5QfZioElfoKZjiCFOqYxgh7tz3xhg/exec";

    let questionBank = [];
    let config = { numQ: 10, duration: 15 };
    let students = [];
    let currentExam = [];
    let userChoices = [];
    let currentIdx = 0;
    let timerInterval;
    let timeLeft = 0;

    // Tự động tải dữ liệu khi mở web
    window.onload = async () => {
        try {
            const res = await fetch(SCRIPT_URL + "?action=getData");
            const data = await res.json();
            config = data.config || config;
            students = data.users || [];
            
            // Lấy câu hỏi từ Drive
            const qRes = await fetch(SCRIPT_URL + "?action=syncDrive");
            questionBank = await qRes.json();
        } catch (e) { console.error("Lỗi khởi tạo:", e); }
    };

    function handleLogin() {
        const u = document.getElementById('login-user').value;
        const p = document.getElementById('login-pass').value;
        if(u === 'admin' && p === 'admin') {
            showAdmin();
        } else {
            const user = students.find(s => s.sbd == u && s.pass == p);
            if(user) {
                document.getElementById('user-name').innerText = u;
                document.getElementById('prep-numQ').innerText = config.numQ;
                document.getElementById('prep-dur').innerText = config.duration;
                switchScreen('prep-screen');
            } else {
                document.getElementById('login-err').innerText = "Sai thông tin!";
            }
        }
    }

    function showAdmin() {
        switchScreen('admin-screen');
        document.getElementById('cfg-numQ').value = config.numQ;
        document.getElementById('cfg-dur').value = config.duration;
        document.getElementById('sync-msg').innerText = `Hiện có ${questionBank.length} câu hỏi.`;
    }

    async function saveAdminConfig() {
        config.numQ = document.getElementById('cfg-numQ').value;
        config.duration = document.getElementById('cfg-dur').value;
        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "saveConfig", data: config })
        });
        alert("Đã lưu cấu hình!");
    }

    async function syncDriveQuestions() {
        document.getElementById('sync-msg').innerText = "Đang quét Drive...";
        const res = await fetch(SCRIPT_URL + "?action=syncDrive");
        questionBank = await res.json();
        document.getElementById('sync-msg').innerText = `Thành công! Đã lấy ${questionBank.length} câu hỏi.`;
    }

    function startQuiz() {
        currentExam = questionBank.sort(() => 0.5 - Math.random()).slice(0, config.numQ);
        userChoices = new Array(currentExam.length).fill(null);
        timeLeft = config.duration * 60;
        switchScreen('quiz-screen');
        startTimer();
        showQuestion();
    }

    function showQuestion() {
        const q = currentExam[currentIdx];
        document.getElementById('q-text').innerText = `Câu ${currentIdx + 1}: ${q.q}`;
        document.getElementById('quiz-progress').innerText = `Câu ${currentIdx + 1}/${currentExam.length}`;
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        ['a','b','c','d'].forEach(key => {
            if(q[key]) {
                const div = document.createElement('div');
                div.className = `option-card ${userChoices[currentIdx] === key ? 'selected' : ''}`;
                div.innerText = `${key.toUpperCase()}. ${q[key]}`;
                div.onclick = () => { userChoices[currentIdx] = key; showQuestion(); };
                box.appendChild(div);
            }
        });
        renderReview();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft/60);
            const s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if(timeLeft <= 0) submitQuiz();
        }, 1000);
    }

    async function submitQuiz() {
        clearInterval(timerInterval);
        let score = 0;
        currentExam.forEach((q, i) => {
            if(userChoices[i] === q.correct.toLowerCase()) score++;
        });
        const finalScore = `${score}/${currentExam.length}`;
        alert("Kết quả của bạn: " + finalScore);
        
        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "saveResult",
                data: { sbd: document.getElementById('user-name').innerText, score: finalScore }
            })
        });
        location.reload();
    }

    function renderReview() {
        const grid = document.getElementById('review-grid');
        grid.innerHTML = userChoices.map((c, i) => `
            <div class="q-badge ${c ? 'answered' : ''}" onclick="currentIdx=${i};showQuestion();">${i+1}</div>
        `).join('');
    }

    function nextQ() { if(currentIdx < currentExam.length - 1) { currentIdx++; showQuestion(); } }
    function prevQ() { if(currentIdx > 0) { currentIdx--; showQuestion(); } }
    function switchScreen(id) {
        ['login-screen', 'admin-screen', 'prep-screen', 'quiz-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
