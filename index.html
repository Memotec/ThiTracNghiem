<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thi Trắc Nghiệm - Full Admin Rights</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --success: #22c55e; --danger: #ef4444; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 1000px; background: white; margin: 0 auto; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; min-height: 500px; }
        .hidden { display: none !important; }
        .p-30 { padding: 30px; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.3s; display: inline-block; text-align: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-admin { background: #0ea5e9; color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { border: 1px solid #cbd5e1; background: transparent; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        
        /* Quiz Layout */
        .quiz-header { background: var(--dark); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .option-card { padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .option-card:hover { border-color: var(--primary); }
        .option-card.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .review-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .badge { padding: 10px; background: #f1f5f9; text-align: center; border-radius: 5px; cursor: pointer; font-weight: 700; }
        .badge.done { background: var(--primary); color: white; }
        
        /* Admin Layout */
        .admin-section { background: #fff; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. MÀN HÌNH ĐĂNG NHẬP -->
    <div id="login-screen" class="p-30">
        <div style="max-width: 400px; margin: 50px auto; text-align: center;">
            <h2 style="color: var(--primary); margin-bottom: 30px;">HỆ THỐNG THI TRỰC TUYẾN</h2>
            <input type="text" id="user-sbd" placeholder="Nhập Số báo danh">
            <button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="handleLogin()">VÀO THI</button>
            <p id="login-msg" style="color:var(--danger); margin-top:15px; font-weight: 500;"></p>
        </div>
    </div>

    <!-- 2. MÀN HÌNH QUẢN TRỊ (ADMIN) -->
    <div id="admin-screen" class="hidden p-30">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #f1f5f9; padding-bottom:15px; margin-bottom:25px;">
            <h3 style="margin:0">BẢNG ĐIỀU KHIỂN QUẢN TRỊ</h3>
            <button class="btn btn-outline" onclick="location.reload()">Đăng xuất</button>
        </div>

        <div class="grid-2">
            <!-- Cấu hình bài thi -->
            <div class="admin-section">
                <h4>⚙️ Cấu hình & Đề thi</h4>
                <div class="grid-2">
                    <div>
                        <small>Số câu hỏi thi:</small>
                        <input type="number" id="cfg-num" value="10">
                    </div>
                    <div>
                        <small>Thời gian (phút):</small>
                        <input type="number" id="cfg-time" value="15">
                    </div>
                </div>
                <button class="btn btn-admin" style="width:100%; margin-top:10px" onclick="syncDrive()">ĐỒNG BỘ CÂU HỎI TỪ DRIVE</button>
                <p id="sync-status" style="font-size: 0.8rem; margin-top: 10px; color: var(--success); font-weight: 700;"></p>
            </div>

            <!-- Quản lý thí sinh -->
            <div class="admin-section" style="background: #f0f9ff; border-color: #bae6fd;">
                <h4>👥 Quản lý thí sinh</h4>
                <div style="display:flex; gap:10px">
                    <input type="text" id="new-sbd" placeholder="SBD mới" style="margin:0">
                    <button class="btn btn-primary" onclick="addNewStudent()">THÊM</button>
                </div>
                <button class="btn btn-outline" style="width:100%; margin-top:10px; background:white" onclick="fetchStudentsFromCloud()">ĐỒNG BỘ DANH SÁCH TỪ CLOUD</button>
                <p id="student-info" style="margin-top:15px; font-size: 0.9rem; font-weight: bold; color: var(--primary);"></p>
            </div>
        </div>
    </div>

    <!-- 3. MÀN HÌNH THI -->
    <div id="quiz-screen" class="hidden">
        <div class="quiz-header">
            <div>Câu <span id="q-idx">1</span> / <span id="q-total">10</span></div>
            <div id="timer">00:00</div>
        </div>
        <div class="p-30">
            <h3 id="q-text" style="margin-bottom: 25px; min-height: 60px;"></h3>
            <div id="options-box"></div>
            
            <div style="display:flex; justify-content:space-between; margin-top:30px">
                <button class="btn btn-outline" onclick="changeQuestion(-1)">QUAY LẠI</button>
                <button class="btn btn-primary" onclick="changeQuestion(1)">TIẾP THEO</button>
            </div>

            <div class="review-grid" id="review-grid"></div>
            <button class="btn btn-danger" style="width:100%; margin-top:30px;" onclick="confirmSubmission()">NỘP BÀI THI</button>
        </div>
    </div>

    <!-- 4. MÀN HÌNH KẾT QUẢ -->
    <div id="result-screen" class="hidden p-30" style="text-align:center">
        <h2 style="color: #64748b;">KẾT QUẢ BÀI THI</h2>
        <h1 id="res-score" style="font-size: 5rem; color: var(--primary); margin: 20px 0;">0/10</h1>
        <p style="color: #94a3b8;">Dữ liệu điểm đã được gửi về hệ thống quản lý.</p>
        <button class="btn btn-primary" style="margin-top: 20px;" onclick="location.reload()">VỀ TRANG CHỦ</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDLzkl-dhmyTlPdsF4bxvX9ksrV51tzWZLFmWOg772Oz4g8f9umbfGLPRuJsoVLT9viQ/exec";

    // Dữ liệu Local
    let db_questions = JSON.parse(localStorage.getItem('db_questions')) || [];
    let validStudents = JSON.parse(localStorage.getItem('db_students')) || [];

    // Trạng thái bài thi
    let currentExam = [], userAnswers = [], currentIdx = 0, timerInterval, totalSec = 0;

    // --- LOGIC QUẢN TRỊ (ADMIN) ---
    async function syncDrive() {
        const status = document.getElementById('sync-status');
        status.innerText = "⏳ Đang kết nối Drive...";
        try {
            const res = await fetch(SCRIPT_URL + "?action=syncDrive");
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            db_questions = data;
            localStorage.setItem('db_questions', JSON.stringify(data));
            status.innerText = "✅ Đã nạp " + data.length + " câu hỏi thành công!";
        } catch (e) { status.innerText = "❌ Lỗi: " + e.message; }
    }

    async function addNewStudent() {
        const sbd = document.getElementById('new-sbd').value.trim();
        if (!sbd) return;
        if (validStudents.includes(sbd)) return alert("Thí sinh này đã tồn tại!");

        validStudents.push(sbd);
        localStorage.setItem('db_students', JSON.stringify(validStudents));
        updateStudentUI();
        
        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ action: "addStudent", data: { sbd: sbd } })
        });
        document.getElementById('new-sbd').value = '';
    }

    async function fetchStudentsFromCloud() {
        try {
            const res = await fetch(SCRIPT_URL + "?action=getStudents");
            const data = await res.json();
            validStudents = data;
            localStorage.setItem('db_students', JSON.stringify(data));
            updateStudentUI();
            alert("Đã đồng bộ danh sách thí sinh!");
        } catch (e) { alert("Lỗi kết nối Cloud!"); }
    }

    function updateStudentUI() {
        document.getElementById('student-info').innerText = `Tổng số thí sinh hợp lệ: ${validStudents.length}`;
    }

    // --- LOGIC ĐĂNG NHẬP ---
    function handleLogin() {
        const sbd = document.getElementById('user-sbd').value.trim();
        if (!sbd) return;

        // Quyền Admin
        if (sbd === 'admin') {
            const pass = prompt("Nhập mật khẩu quản trị:");
            if (pass === 'admin') {
                updateStudentUI();
                return switchScreen('admin-screen');
            }
            return alert("Sai mật khẩu!");
        }

        // Quyền Thí sinh (Kiểm soát bởi Admin)
        if (validStudents.length > 0 && !validStudents.includes(sbd)) {
            return document.getElementById('login-msg').innerText = "Số báo danh không có quyền truy cập!";
        }

        startQuiz(sbd);
    }

    // --- LOGIC BÀI THI ---
    function startQuiz(sbd) {
        const saved = localStorage.getItem('backup_' + sbd);
        if (saved && confirm("Hệ thống phát hiện bạn đang làm dở bài thi. Bạn có muốn phục hồi dữ liệu không?")) {
            const data = JSON.parse(saved);
            currentExam = data.currentExam;
            userAnswers = data.userAnswers;
            totalSec = data.totalSec;
            currentIdx = data.currentIdx;
        } else {
            if (db_questions.length === 0) return alert("Hệ thống chưa có đề thi. Vui lòng liên hệ Admin!");
            const numQ = parseInt(document.getElementById('cfg-num').value) || 10;
            currentExam = [...db_questions].sort(() => 0.5 - Math.random()).slice(0, numQ);
            userAnswers = currentExam.map(q => ({ choice: null, correct: q.correct.toString().toLowerCase().trim() }));
            totalSec = (parseInt(document.getElementById('cfg-time').value) || 15) * 60;
        }
        
        document.getElementById('q-total').innerText = currentExam.length;
        switchScreen('quiz-screen');
        runTimer();
        renderQuestion();
    }

    function renderQuestion() {
        const q = currentExam[currentIdx];
        document.getElementById('q-idx').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = q.q;
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        ['a','b','c','d'].forEach(key => {
            if (q[key]) {
                const div = document.createElement('div');
                div.className = `option-card ${userAnswers[currentIdx].choice === key ? 'selected' : ''}`;
                div.innerText = key.toUpperCase() + ". " + q[key];
                div.onclick = () => { 
                    userAnswers[currentIdx].choice = key; 
                    saveProgress(); 
                    renderQuestion(); 
                };
                box.appendChild(div);
            }
        });
        updateReviewGrid();
    }

    function saveProgress() {
        const sbd = document.getElementById('user-sbd').value;
        localStorage.setItem('backup_' + sbd, JSON.stringify({
            currentExam, userAnswers, totalSec, currentIdx
        }));
    }

    function runTimer() {
        timerInterval = setInterval(() => {
            totalSec--;
            const m = Math.floor(totalSec/60), s = totalSec%60;
            document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if (totalSec % 10 === 0) saveProgress(); // Backup mỗi 10 giây
            if (totalSec <= 0) finalizeQuiz();
        }, 1000);
    }

    async function finalizeQuiz() {
        clearInterval(timerInterval);
        const sbd = document.getElementById('user-sbd').value;
        localStorage.removeItem('backup_' + sbd);

        let score = userAnswers.filter(a => a.choice === a.correct).length;
        let resultTxt = score + "/" + currentExam.length;
        
        document.getElementById('res-score').innerText = resultTxt;
        switchScreen('result-screen');

        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ action: "saveResult", data: { sbd, score: resultTxt } })
        });
    }

    // --- TIỆN ÍCH ---
    function updateReviewGrid() {
        document.getElementById('review-grid').innerHTML = userAnswers.map((a, i) => `
            <div class="badge ${a.choice ? 'done' : ''}" onclick="goToQuestion(${i})">${i+1}</div>
        `).join('');
    }
    function goToQuestion(i) { currentIdx = i; renderQuestion(); }
    function changeQuestion(step) {
        let newIdx = currentIdx + step;
        if (newIdx >= 0 && newIdx < currentExam.length) {
            currentIdx = newIdx;
            renderQuestion();
        }
    }
    function confirmSubmission() { if(confirm("Bạn có chắc chắn muốn nộp bài?")) finalizeQuiz(); }
    function switchScreen(id) {
        ['login-screen', 'admin-screen', 'quiz-screen', 'result-screen'].forEach(s => {
            document.getElementById(s).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }

    // Khởi tạo hiển thị thí sinh nếu có sẵn
    if(validStudents.length > 0) updateStudentUI();
</script>
</body>
</html>
