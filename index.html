<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Thi - Admin Full Power</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --success: #22c55e; --danger: #ef4444; --dark: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        .container { max-width: 1100px; background: white; margin: 30px auto; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; min-height: 600px; }
        .hidden { display: none !important; }
        .p-30 { padding: 30px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-admin { background: #0ea5e9; color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { border: 1px solid #cbd5e1; background: #fff; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: inherit; }

        /* MODAL ĐĂNG NHẬP */
        #login-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; }
        
        /* ADMIN DASHBOARD */
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; margin-bottom: 30px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #fff; border: 1px solid #e2e8f0; padding: 25px; border-radius: 12px; }
        
        /* STUDENT LIST TABLE */
        .student-table-container { margin-top: 15px; max-height: 200px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #f8fafc; position: sticky; top: 0; padding: 10px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        /* THI INTERFACE */
        .quiz-layout { display: grid; grid-template-columns: 1fr 300px; gap: 25px; }
        .option-card { padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
        .option-card.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .review-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .q-badge { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; border: 1px solid #cbd5e1; cursor: pointer; font-weight: bold; }
        .q-badge.answered { background: var(--primary); color: white; }
        .q-badge.current { border: 2px solid var(--primary); color: var(--primary); }
    </style>
</head>
<body>

<!-- CỬA SỔ ĐĂNG NHẬP -->
<div id="login-modal">
    <div class="modal-content">
        <h2 style="text-align:center; color: var(--primary);">HỆ THỐNG THI</h2>
        <label style="font-weight:bold; font-size: 0.8rem;">TÀI KHOẢN (SBD)</label>
        <input type="text" id="login-user" placeholder="Nhập SBD hoặc admin">
        <label style="font-weight:bold; font-size: 0.8rem;">MẬT KHẨU</label>
        <input type="password" id="login-pass" placeholder="••••••••">
        <button class="btn btn-primary" style="width:100%; margin-top: 20px;" onclick="handleLogin()">ĐĂNG NHẬP</button>
        <p id="login-msg" style="color:var(--danger); text-align: center; margin-top:15px; font-weight: bold; font-size: 0.85rem;"></p>
    </div>
</div>

<div class="container">
    <div id="welcome-screen" class="p-30" style="text-align:center; padding: 100px 0;">
        <h2 style="color: #cbd5e1;">Vui lòng đăng nhập để tiếp tục...</h2>
    </div>

    <!-- TOÀN BỘ TÍNH NĂNG ADMIN -->
    <div id="admin-screen" class="hidden p-30">
        <div class="admin-header">
            <h2 style="margin:0">🛠️ Quản Trị Viên</h2>
            <button class="btn btn-outline" onclick="location.reload()">Đăng xuất</button>
        </div>

        <div class="admin-grid">
            <!-- 1. QUẢN LÝ ĐỀ THI -->
            <div class="card">
                <h3 style="margin-top:0">📝 Quản Lý Đề Thi</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <div>
                        <small>Số câu thi</small>
                        <input type="number" id="cfg-num" value="10">
                    </div>
                    <div>
                        <small>Thời gian (phút)</small>
                        <input type="number" id="cfg-time" value="15">
                    </div>
                </div>
                <button class="btn btn-admin" style="width:100%; margin-top:15px" onclick="syncDrive()">
                    🔄 ĐỒNG BỘ CÂU HỎI TỪ GOOGLE DRIVE
                </button>
                <p id="question-status" style="font-size: 0.8rem; color: #64748b; margin-top:10px;">Dữ liệu: 0 câu hỏi sẵn có.</p>
            </div>

            <!-- 2. QUẢN LÝ THÍ SINH (Thêm/Bớt) -->
            <div class="card" style="background: #f0f9ff;">
                <h3 style="margin-top:0">👥 Quản Lý Thí Sinh</h3>
                <div style="display:flex; gap:8px">
                    <input type="text" id="new-sbd" placeholder="Nhập SBD mới..." style="margin:0">
                    <button class="btn btn-primary" onclick="addNewStudent()">THÊM</button>
                </div>
                
                <div class="student-table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Số báo danh</th>
                                <th style="text-align:right">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="student-list-body">
                            <!-- Danh sách sẽ hiện ở đây -->
                        </tbody>
                    </table>
                </div>
                <button class="btn btn-outline" style="width:100%; margin-top:10px; font-size: 0.8rem;" onclick="fetchStudentsFromCloud()">
                    ☁️ TẢI DANH SÁCH TỪ MÁY CHỦ
                </button>
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH LÀM BÀI -->
    <div id="quiz-screen" class="hidden">
        <div style="background: var(--dark); color: white; padding: 15px 30px; display:flex; justify-content: space-between; align-items:center;">
            <span>SBD: <strong id="display-sbd">---</strong></span>
            <div id="timer" style="font-size: 1.5rem; color: #fbbf24; font-weight:bold;">00:00</div>
        </div>
        <div class="p-30 quiz-layout">
            <div>
                <h2 style="margin-top:0; color: var(--primary);">Câu <span id="q-idx">1</span></h2>
                <h3 id="q-text" style="margin-bottom:20px; line-height:1.5"></h3>
                <div id="options-box"></div>
                <div style="display:flex; gap:15px; margin-top:30px;">
                    <button class="btn btn-outline" style="flex:1" onclick="changeQuestion(-1)">CÂU TRƯỚC</button>
                    <button class="btn btn-primary" style="flex:1" onclick="changeQuestion(1)">CÂU TIẾP</button>
                </div>
            </div>
            <div style="background:#f8fafc; padding:20px; border-radius:12px; border:1px solid #eee;">
                <h4 style="margin-top:0">TIẾN ĐỘ</h4>
                <div class="review-grid" id="review-grid"></div>
                <button class="btn btn-danger" style="width:100%; margin-top:30px" onclick="confirmSubmission()">NỘP BÀI</button>
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH KẾT QUẢ -->
    <div id="result-screen" class="hidden p-30" style="text-align:center">
        <h2 style="color: #64748b;">KẾT QUẢ CỦA BẠN</h2>
        <h1 id="res-score" style="font-size: 5rem; color: var(--primary);">0/0</h1>
        <button class="btn btn-primary" onclick="location.reload()">QUAY LẠI</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDLzkl-dhmyTlPdsF4bxvX9ksrV51tzWZLFmWOg772Oz4g8f9umbfGLPRuJsoVLT9viQ/exec";

    let db_questions = JSON.parse(localStorage.getItem('db_questions')) || [];
    let validStudents = JSON.parse(localStorage.getItem('db_students')) || [];
    let currentExam = [], userAnswers = [], currentIdx = 0, timerInterval, totalSec = 0;

    // --- XỬ LÝ ĐĂNG NHẬP ---
    function handleLogin() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        const msg = document.getElementById('login-msg');

        if(u === 'admin' && p === 'admin') {
            document.getElementById('login-modal').style.display = 'none';
            switchScreen('admin-screen');
            renderStudentList();
            updateAdminStats();
            return;
        }

        if(validStudents.includes(u) && p === '123') {
            document.getElementById('login-modal').style.display = 'none';
            startQuiz(u);
            return;
        }
        msg.innerText = "Sai tài khoản hoặc mật khẩu!";
    }

    // --- TÍNH NĂNG ADMIN ---
    async function syncDrive() {
        try {
            const res = await fetch(SCRIPT_URL + "?action=syncDrive");
            db_questions = await res.json();
            localStorage.setItem('db_questions', JSON.stringify(db_questions));
            updateAdminStats();
            alert("Đã đồng bộ thành công " + db_questions.length + " câu hỏi!");
        } catch(e) { alert("Lỗi kết nối API!"); }
    }

    function addNewStudent() {
        const sbd = document.getElementById('new-sbd').value.trim();
        if(!sbd || validStudents.includes(sbd)) return;
        validStudents.push(sbd);
        saveStudents();
        renderStudentList();
        document.getElementById('new-sbd').value = '';
        // Lưu lên Cloud (Optional)
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "addStudent", data: { sbd } }) });
    }

    function removeStudent(sbd) {
        if(!confirm(`Xóa thí sinh ${sbd}?`)) return;
        validStudents = validStudents.filter(item => item !== sbd);
        saveStudents();
        renderStudentList();
    }

    async function fetchStudentsFromCloud() {
        try {
            const res = await fetch(SCRIPT_URL + "?action=getStudents");
            validStudents = await res.json();
            saveStudents();
            renderStudentList();
        } catch(e) { alert("Lỗi tải danh sách!"); }
    }

    function saveStudents() { localStorage.setItem('db_students', JSON.stringify(validStudents)); }

    function renderStudentList() {
        const tbody = document.getElementById('student-list-body');
        tbody.innerHTML = validStudents.map(sbd => `
            <tr>
                <td><strong>${sbd}</strong></td>
                <td style="text-align:right">
                    <button class="btn btn-danger" style="padding:4px 8px; font-size:0.7rem;" onclick="removeStudent('${sbd}')">XÓA</button>
                </td>
            </tr>
        `).join('');
    }

    function updateAdminStats() {
        document.getElementById('question-status').innerText = `Dữ liệu: ${db_questions.length} câu hỏi sẵn có.`;
    }

    // --- TÍNH NĂNG THI ---
    function startQuiz(sbd) {
        document.getElementById('display-sbd').innerText = sbd;
        const backup = localStorage.getItem('backup_' + sbd);
        if(backup && confirm("Phục hồi bài thi đang làm dở?")) {
            const data = JSON.parse(backup);
            currentExam = data.currentExam; userAnswers = data.userAnswers;
            totalSec = data.totalSec; currentIdx = data.currentIdx;
        } else {
            const num = parseInt(document.getElementById('cfg-num').value) || 10;
            currentExam = [...db_questions].sort(() => 0.5 - Math.random()).slice(0, num);
            userAnswers = currentExam.map(q => ({ choice: null, correct: q.correct.toString().toLowerCase().trim() }));
            totalSec = (parseInt(document.getElementById('cfg-time').value) || 15) * 60;
        }
        switchScreen('quiz-screen');
        runTimer();
        renderQuestion();
    }

    function renderQuestion() {
        const q = currentExam[currentIdx];
        document.getElementById('q-idx').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        ['a','b','c','d'].forEach(k => {
            if(q[k]) {
                const div = document.createElement('div');
                div.className = `option-card ${userAnswers[currentIdx].choice === k ? 'selected' : ''}`;
                div.innerHTML = `<b>${k.toUpperCase()}.</b> ${q[k]}`;
                div.onclick = () => { userAnswers[currentIdx].choice = k; saveProgress(); renderQuestion(); };
                box.appendChild(div);
            }
        });
        renderReviewGrid();
    }

    function renderReviewGrid() {
        document.getElementById('review-grid').innerHTML = userAnswers.map((ans, i) => `
            <div class="q-badge ${i === currentIdx ? 'current' : ''} ${ans.choice ? 'answered' : ''}" 
                 onclick="currentIdx=${i};renderQuestion()">${i + 1}</div>
        `).join('');
    }

    function changeQuestion(step) {
        let n = currentIdx + step;
        if(n >= 0 && n < currentExam.length) { currentIdx = n; renderQuestion(); }
    }

    function saveProgress() {
        const sbd = document.getElementById('login-user').value;
        localStorage.setItem('backup_' + sbd, JSON.stringify({ currentExam, userAnswers, totalSec, currentIdx }));
    }

    function runTimer() {
        timerInterval = setInterval(() => {
            totalSec--;
            const m = Math.floor(totalSec/60), s = totalSec%60;
            document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if(totalSec <= 0) finalizeQuiz();
        }, 1000);
    }

    async function finalizeQuiz() {
        clearInterval(timerInterval);
        const sbd = document.getElementById('login-user').value;
        localStorage.removeItem('backup_' + sbd);
        let score = userAnswers.filter(a => a.choice === a.correct).length;
        document.getElementById('res-score').innerText = score + "/" + currentExam.length;
        switchScreen('result-screen');
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "saveResult", data: { sbd, score: score + "/" + currentExam.length } }) });
    }

    function confirmSubmission() { if(confirm("Nộp bài thi?")) finalizeQuiz(); }

    function switchScreen(id) {
        ['welcome-screen', 'admin-screen', 'quiz-screen', 'result-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    window.onload = () => { updateAdminStats(); };
</script>
</body>
</html>
