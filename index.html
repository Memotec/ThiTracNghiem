<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thi Trắc Nghiệm - Full Features</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --success: #22c55e; --danger: #ef4444; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 1100px; background: white; margin: 0 auto; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; min-height: 550px; }
        .hidden { display: none !important; }
        .p-30 { padding: 30px; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.3s; display: inline-block; text-align: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-admin { background: #0ea5e9; color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { border: 1px solid #cbd5e1; background: #fff; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        
        /* Giao diện thi 2 cột */
        .quiz-layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .quiz-header { background: var(--dark); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Câu hỏi & Đáp án */
        .option-card { padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .option-card:hover { border-color: var(--primary); background: #f5f3ff; }
        .option-card.selected { background: var(--primary); color: white; border-color: var(--primary); }

        /* Khung Review câu hỏi */
        .review-panel { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; height: fit-content; position: sticky; top: 20px; }
        .review-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .q-badge { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: #fff; border: 1px solid #cbd5e1; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
        .q-badge.current { border: 2px solid var(--primary); color: var(--primary); }
        .q-badge.answered { background: var(--primary); color: white; border-color: var(--primary); }

        /* Admin */
        .admin-section { background: #fff; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. MÀN HÌNH ĐĂNG NHẬP (Giữ nguyên) -->
    <div id="login-screen" class="p-30">
        <div style="max-width: 400px; margin: 50px auto; text-align: center;">
            <h2 style="color: var(--primary);">HỆ THỐNG THI TRỰC TUYẾN</h2>
            <input type="text" id="user-sbd" placeholder="Nhập Số báo danh">
            <button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="handleLogin()">VÀO THI</button>
            <p id="login-msg" style="color:var(--danger); margin-top:15px; font-weight: 500;"></p>
        </div>
    </div>

    <!-- 2. MÀN HÌNH QUẢN TRỊ (Giữ nguyên quyền) -->
    <div id="admin-screen" class="hidden p-30">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #f1f5f9; padding-bottom:15px; margin-bottom:25px;">
            <h3 style="margin:0">BẢNG QUẢN TRỊ</h3>
            <button class="btn btn-outline" onclick="location.reload()">Đăng xuất</button>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="admin-section">
                <h4>⚙️ Cấu hình & Đề thi</h4>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <input type="number" id="cfg-num" value="10" placeholder="Số câu">
                    <input type="number" id="cfg-time" value="15" placeholder="Phút">
                </div>
                <button class="btn btn-admin" style="width:100%; margin-top:10px" onclick="syncDrive()">ĐỒNG BỘ ĐỀ TỪ DRIVE</button>
                <p id="sync-status" style="font-size: 0.8rem; margin-top: 10px; color: var(--success); font-weight: 700;"></p>
            </div>
            <div class="admin-section" style="background: #f0f9ff;">
                <h4>👥 Quản lý thí sinh</h4>
                <div style="display:flex; gap:10px">
                    <input type="text" id="new-sbd" placeholder="SBD mới" style="margin:0">
                    <button class="btn btn-primary" onclick="addNewStudent()">THÊM</button>
                </div>
                <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="fetchStudentsFromCloud()">ĐỒNG BỘ DANH SÁCH</button>
                <p id="student-info" style="margin-top:10px; font-size: 0.9rem; font-weight: bold;"></p>
            </div>
        </div>
    </div>

    <!-- 3. MÀN HÌNH THI (BỔ SUNG NÚT TRƯỚC & KHUNG REVIEW) -->
    <div id="quiz-screen" class="hidden">
        <div class="quiz-header">
            <div>Thí sinh: <strong id="display-sbd">---</strong></div>
            <div id="timer" style="font-size: 1.6rem; font-weight: bold; color: #fbbf24;">00:00</div>
        </div>
        
        <div class="p-30 quiz-layout">
            <!-- Cột trái: Câu hỏi -->
            <div>
                <h2 style="margin-top:0; color: var(--primary);">Câu hỏi <span id="q-idx">1</span>:</h2>
                <h3 id="q-text" style="line-height: 1.6; margin-bottom: 25px;"> Đang tải câu hỏi...</h3>
                
                <div id="options-box"></div>
                
                <div style="display:flex; gap: 15px; margin-top: 30px;">
                    <button class="btn btn-outline" style="flex:1" onclick="changeQuestion(-1)">⬅️ CÂU TRƯỚC</button>
                    <button class="btn btn-primary" style="flex:1" onclick="changeQuestion(1)">CÂU TIẾP THEO ➡️</button>
                </div>
            </div>

            <!-- Cột phải: Khung Review (MỚI) -->
            <div class="review-panel">
                <h4 style="margin-top:0; border-bottom: 1px solid #cbd5e1; padding-bottom: 10px;">TIẾN ĐỘ BÀI THI</h4>
                <p style="font-size: 0.85rem; color: #64748b;">Nhấp vào số câu để chuyển nhanh:</p>
                <div class="review-grid" id="review-grid"></div>
                
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #cbd5e1;">
                <button class="btn btn-danger" style="width:100%" onclick="confirmSubmission()">NỘP BÀI THI</button>
            </div>
        </div>
    </div>

    <!-- 4. MÀN HÌNH KẾT QUẢ -->
    <div id="result-screen" class="hidden p-30" style="text-align:center">
        <h1 id="res-score" style="font-size: 5rem; color: var(--primary); margin: 20px 0;">0/0</h1>
        <p>Kết quả của bạn đã được ghi nhận thành công.</p>
        <button class="btn btn-primary" onclick="location.reload()">HOÀN TẤT</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDLzkl-dhmyTlPdsF4bxvX9ksrV51tzWZLFmWOg772Oz4g8f9umbfGLPRuJsoVLT9viQ/exec";

    let db_questions = JSON.parse(localStorage.getItem('db_questions')) || [];
    let validStudents = JSON.parse(localStorage.getItem('db_students')) || [];
    let currentExam = [], userAnswers = [], currentIdx = 0, timerInterval, totalSec = 0;

    // --- QUẢN TRỊ (Giữ nguyên) ---
    async function syncDrive() {
        document.getElementById('sync-status').innerText = "⏳ Đang đồng bộ...";
        try {
            const res = await fetch(SCRIPT_URL + "?action=syncDrive");
            const data = await res.json();
            db_questions = data;
            localStorage.setItem('db_questions', JSON.stringify(data));
            document.getElementById('sync-status').innerText = "✅ Đã nạp " + data.length + " câu hỏi.";
        } catch (e) { alert("Lỗi đồng bộ!"); }
    }

    async function addNewStudent() {
        const sbd = document.getElementById('new-sbd').value.trim();
        if (!sbd) return;
        validStudents.push(sbd);
        localStorage.setItem('db_students', JSON.stringify(validStudents));
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "addStudent", data: { sbd } }) });
        document.getElementById('new-sbd').value = '';
        updateStudentUI();
    }

    async function fetchStudentsFromCloud() {
        const res = await fetch(SCRIPT_URL + "?action=getStudents");
        validStudents = await res.json();
        localStorage.setItem('db_students', JSON.stringify(validStudents));
        updateStudentUI();
    }

    function updateStudentUI() { document.getElementById('student-info').innerText = `Tổng số thí sinh: ${validStudents.length}`; }

    // --- ĐĂNG NHẬP & PHỤC HỒI ---
    function handleLogin() {
        const sbd = document.getElementById('user-sbd').value.trim();
        if (!sbd) return;
        if (sbd === 'admin') {
            const p = prompt("Mật khẩu:");
            if (p === 'admin') return switchScreen('admin-screen');
            return;
        }
        if (validStudents.length > 0 && !validStudents.includes(sbd)) return alert("SBD không hợp lệ!");
        startQuiz(sbd);
    }

    function startQuiz(sbd) {
        document.getElementById('display-sbd').innerText = sbd;
        const saved = localStorage.getItem('backup_' + sbd);
        
        if (saved && confirm("Bạn có bài thi chưa hoàn thành. Phục hồi dữ liệu?")) {
            const data = JSON.parse(saved);
            currentExam = data.currentExam;
            userAnswers = data.userAnswers;
            totalSec = data.totalSec;
            currentIdx = data.currentIdx;
        } else {
            const num = parseInt(document.getElementById('cfg-num').value) || 10;
            currentExam = [...db_questions].sort(() => 0.5 - Math.random()).slice(0, num);
            userAnswers = currentExam.map(q => ({ choice: null, correct: q.correct.toString().toLowerCase().trim() }));
            totalSec = (parseInt(document.getElementById('cfg-time').value) || 15) * 60;
        }
        
        switchScreen('quiz-screen');
        runTimer();
        renderQuestion();
    }

    // --- LOGIC LÀM BÀI (CẬP NHẬT RENDER REVIEW) ---
    function renderQuestion() {
        const q = currentExam[currentIdx];
        document.getElementById('q-idx').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = q.q;
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        ['a','b','c','d'].forEach(key => {
            if (q[key]) {
                const div = document.createElement('div');
                div.className = `option-card ${userAnswers[currentIdx].choice === key ? 'selected' : ''}`;
                div.innerText = key.toUpperCase() + ". " + q[key];
                div.onclick = () => { 
                    userAnswers[currentIdx].choice = key; 
                    saveProgress(); 
                    renderQuestion(); 
                };
                box.appendChild(div);
            }
        });
        renderReviewGrid();
    }

    function renderReviewGrid() {
        const grid = document.getElementById('review-grid');
        grid.innerHTML = userAnswers.map((ans, i) => `
            <div class="q-badge ${i === currentIdx ? 'current' : ''} ${ans.choice ? 'answered' : ''}" 
                 onclick="goToQuestion(${i})">
                ${i + 1}
            </div>
        `).join('');
    }

    function goToQuestion(i) {
        currentIdx = i;
        renderQuestion();
    }

    function changeQuestion(step) {
        let n = currentIdx + step;
        if (n >= 0 && n < currentExam.length) {
            currentIdx = n;
            renderQuestion();
        }
    }

    function saveProgress() {
        const sbd = document.getElementById('user-sbd').value;
        localStorage.setItem('backup_' + sbd, JSON.stringify({ currentExam, userAnswers, totalSec, currentIdx }));
    }

    function runTimer() {
        timerInterval = setInterval(() => {
            totalSec--;
            const m = Math.floor(totalSec/60), s = totalSec%60;
            document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if (totalSec <= 0) finalizeQuiz();
        }, 1000);
    }

    function confirmSubmission() { if(confirm("Bạn có chắc muốn nộp bài?")) finalizeQuiz(); }

    async function finalizeQuiz() {
        clearInterval(timerInterval);
        const sbd = document.getElementById('user-sbd').value;
        localStorage.removeItem('backup_' + sbd);
        let score = userAnswers.filter(a => a.choice === a.correct).length;
        document.getElementById('res-score').innerText = score + "/" + currentExam.length;
        switchScreen('result-screen');
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "saveResult", data: { sbd, score: score + "/" + currentExam.length } }) });
    }

    function switchScreen(id) {
        ['login-screen', 'admin-screen', 'quiz-screen', 'result-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    if(validStudents.length > 0) updateStudentUI();
</script>
</body>
</html>
