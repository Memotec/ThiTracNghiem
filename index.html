<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Thi Trắc Nghiệm</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; background: white; margin: 0 auto; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
        .hidden { display: none !important; }
        .p-30 { padding: 30px; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; }
        .quiz-header { background: var(--dark); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .option-card { padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
        .option-card.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .review-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .badge { padding: 10px; background: #f1f5f9; text-align: center; border-radius: 5px; cursor: pointer; }
        .badge.done { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <!-- MÀN HÌNH ĐĂNG NHẬP -->
    <div id="login-screen" class="p-30">
        <h2 style="text-align:center">ĐĂNG NHẬP</h2>
        <input type="text" id="user-sbd" placeholder="Nhập Số báo danh">
        <button class="btn btn-primary" style="width:100%" onclick="login()">VÀO THI</button>
        <hr style="margin: 30px 0">
        <button class="btn" style="width:100%; background:#0ea5e9; color:white" onclick="syncDrive()">ĐỒNG BỘ ĐỀ TỪ DRIVE (ADMIN)</button>
    </div>

    <!-- MÀN HÌNH THI -->
    <div id="quiz-screen" class="hidden">
        <div class="quiz-header">
            <div>Câu <span id="q-idx">1</span></div>
            <div id="timer" style="font-size: 1.5rem">00:00</div>
        </div>
        <div class="p-30">
            <h3 id="q-text"></h3>
            <div id="options-box"></div>
            <div style="display:flex; justify-content:space-between; margin-top:30px">
                <button class="btn" onclick="prevQ()">QUAY LẠI</button>
                <button class="btn btn-primary" onclick="nextQ()">TIẾP THEO</button>
            </div>
            <div class="review-grid" id="review-grid"></div>
            <button class="btn" style="width:100%; margin-top:30px; background:#ef4444; color:white" onclick="confirmSubmit()">NỘP BÀI</button>
        </div>
    </div>

    <!-- MÀN HÌNH KẾT QUẢ -->
    <div id="result-screen" class="hidden p-30" style="text-align:center">
        <h1 id="res-score" style="font-size: 4rem; color: var(--primary)"></h1>
        <button class="btn btn-primary" onclick="location.reload()">THOÁT</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxuR0w8XtD_Ze3D3pOXLG8PIVKg2rT0DZ0KySAV9hvzb_rBKrL-kFE4wL8fxenShFJ4Kw/exec"; // <-- QUAN TRỌNG: Thay URL của bạn vào đây

    let db_questions = JSON.parse(localStorage.getItem('db_questions')) || [];
    let currentExam = [], userAnswers = [], currentIdx = 0, timer, totalSec = 900;

    // 1. Đồng bộ Drive
    async function syncDrive() {
        try {
            const res = await fetch(SCRIPT_URL + "?action=syncDrive");
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            db_questions = data;
            localStorage.setItem('db_questions', JSON.stringify(data));
            alert("Đã đồng bộ thành công " + data.length + " câu hỏi!");
        } catch (e) { alert("Lỗi: " + e.message); }
    }

    // 2. Đăng nhập & Kiểm tra Phục hồi
    function login() {
        const sbd = document.getElementById('user-sbd').value;
        if (!sbd) return alert("Vui lòng nhập SBD!");
        
        const saved = localStorage.getItem('backup_' + sbd);
        if (saved && confirm("Bạn có bài thi chưa hoàn thành. Tiếp tục chứ?")) {
            const data = JSON.parse(saved);
            currentExam = data.currentExam;
            userAnswers = data.userAnswers;
            totalSec = data.totalSec;
            currentIdx = data.currentIdx;
        } else {
            if (db_questions.length === 0) return alert("Chưa có dữ liệu đề thi!");
            currentExam = [...db_questions].sort(() => 0.5 - Math.random()).slice(0, 10);
            userAnswers = currentExam.map(q => ({ choice: null, correct: q.correct.toString().toLowerCase().trim() }));
            totalSec = 900; // 15 phút
        }
        
        switchScreen('quiz-screen');
        startTimer();
        renderQ();
    }

    // 3. Logic hiển thị và Lưu tạm
    function renderQ() {
        const q = currentExam[currentIdx];
        document.getElementById('q-idx').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = q.q;
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        ['a','b','c','d'].forEach(key => {
            if (q[key]) {
                const div = document.createElement('div');
                div.className = `option-card ${userAnswers[currentIdx].choice === key ? 'selected' : ''}`;
                div.innerText = key.toUpperCase() + ". " + q[key];
                div.onclick = () => { 
                    userAnswers[currentIdx].choice = key; 
                    autoSave(); 
                    renderQ(); 
                };
                box.appendChild(div);
            }
        });
        renderReview();
    }

    function autoSave() {
        const sbd = document.getElementById('user-sbd').value;
        localStorage.setItem('backup_' + sbd, JSON.stringify({
            currentExam, userAnswers, totalSec, currentIdx
        }));
    }

    function startTimer() {
        timer = setInterval(() => {
            totalSec--;
            const m = Math.floor(totalSec/60), s = totalSec%60;
            document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if (totalSec % 5 === 0) autoSave(); // Tự động lưu mỗi 5 giây
            if (totalSec <= 0) submitQuiz();
        }, 1000);
    }

    function confirmSubmit() { if(confirm("Bạn có chắc muốn nộp bài?")) submitQuiz(); }

    async function submitQuiz() {
        clearInterval(timer);
        const sbd = document.getElementById('user-sbd').value;
        localStorage.removeItem('backup_' + sbd); // Xóa bản lưu sau khi nộp

        let score = userAnswers.filter(a => a.choice === a.correct).length;
        let finalScore = score + "/" + currentExam.length;
        
        document.getElementById('res-score').innerText = finalScore;
        switchScreen('result-screen');

        await fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ action: "saveResult", data: { sbd, score: finalScore } })
        });
    }

    function renderReview() {
        document.getElementById('review-grid').innerHTML = userAnswers.map((a, i) => `
            <div class="badge ${a.choice ? 'done' : ''}" onclick="currentIdx=${i};renderQ()">${i+1}</div>
        `).join('');
    }

    function nextQ() { if(currentIdx < currentExam.length - 1) { currentIdx++; renderQ(); } }
    function prevQ() { if(currentIdx > 0) { currentIdx--; renderQ(); } }
    function switchScreen(id) {
        ['login-screen', 'quiz-screen', 'result-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
